// MODULE 7 — VPC DEEP DIVE
// ═══════════════════════════════════════════════════════════════════
{
  id:7, title:"VPC, NAT, NACLs — Networking", icon:"🔒",
  tags:["VPC","Subnets","NAT Gateway","NACLs","Security Groups"],
  overview:"A VPC (Virtual Private Cloud) is your own isolated, private network inside AWS. Every EC2 instance, RDS database, and Lambda function lives inside a VPC. Understanding VPC means understanding how data flows through your AWS infrastructure — from the internet, through firewalls, to your servers, and back.",
  why:"Every AWS service lives in a VPC. Security breaches often come from misconfigured VPCs (wrong security groups, public instances that should be private). Understanding VPC architecture is the difference between a secure system and a hacked one.",
  steps:[
    {
      n:"01", title:"VPC CIDR, Subnets, and Why They Exist",
      short:"Setting up your private IP address space and network segments",
      why:"Without a VPC, all your instances would be on a flat public network — no privacy, no segmentation. VPC lets you create a private network with your own IP range. Subnets divide that network into segments: Public (internet-facing servers), Private (databases, app servers), Isolated (no internet access at all). This segmentation is core to security.",
      how:[
        "VPC CIDR 10.0.0.0/16 = your entire private network (65,536 IPs available)",
        "Public Subnet 10.0.1.0/24 = 256 IPs, has route to Internet Gateway → EC2 here gets public IP",
        "Private Subnet 10.0.2.0/24 = 256 IPs, NO route to internet → databases, app servers go here",
        "AWS reserves 5 IPs per subnet: .0 (network), .1 (router), .2 (DNS), .3 (reserved), .255 (broadcast)",
        "Internet Gateway = the door to the internet, attached to your VPC",
        "Route Table = GPS navigation for your network (where to send traffic)"
      ],
      tip:"Best practice architecture: Public Subnet → ALB + NAT Gateway. Private Subnet → EC2 App Servers. Isolated Subnet → RDS Databases. Your database should NEVER be in a public subnet.",
      warn:"AWS reserves 5 IPs per subnet. A /24 has 256 addresses but only 251 are usable. A /28 (smallest allowed) has 16 addresses but only 11 usable. Plan your CIDR ranges before creating VPCs — you cannot resize a VPC later."
    },
    {
      n:"02", title:"NAT Gateway — Private Instances Accessing Internet",
      short:"Allowing private subnet instances to reach the internet without being reachable FROM the internet",
      why:"Your app servers in the private subnet need to: download software updates, call external APIs, connect to AWS services. But you don't want internet users connecting directly to them. NAT Gateway solves this: private instances can make OUTBOUND requests, but NO inbound connections can come from outside. One-way door.",
      how:[
        "Create NAT Gateway in the PUBLIC subnet (it needs internet access itself)",
        "Assign an Elastic IP to the NAT Gateway (static public IP)",
        "In private subnet's route table: add 0.0.0.0/0 → nat-gateway-id",
        "Now private instances send outbound traffic to NAT GW → NAT GW sends to internet using its Elastic IP",
        "Response comes back to NAT GW → NAT GW forwards to private instance",
        "External servers only see the NAT Gateway's Elastic IP, never the private instance's IP"
      ],
      tip:"ALL private instances in the subnet share the NAT Gateway's one Elastic IP for outbound traffic. If 100 instances make requests simultaneously, they all appear to come from one IP. This is normal and expected.",
      warn:"NAT Gateway costs $0.045/hour (~$32/month) even when idle, PLUS $0.045/GB data. In dev environments, use a NAT Instance (a small EC2 running as NAT) which is cheaper but less reliable. Always DELETE NAT GW when not in use!"
    },
    {
      n:"03", title:"Security Groups vs NACLs — Two Layers of Firewall",
      short:"Understanding the difference between instance-level and subnet-level firewalls",
      why:"AWS has TWO layers of network security. This defense-in-depth means even if one layer is misconfigured, the other can catch the problem. Security Groups are your first line of defense (instance level). NACLs are the second line (subnet level). Understanding both prevents you from accidentally exposing servers to the internet.",
      how:[
        "Security Groups: STATEFUL. Allow inbound port 80 → response traffic automatically allowed outbound. You only write rules for traffic you initiate.",
        "NACLs: STATELESS. Allow inbound port 80 → must ALSO write outbound rule for ports 1024-65535 (response traffic). Forget this = connections hang.",
        "Security Groups: ALLOW only (no DENY rules). Default: all outbound allowed, all inbound blocked.",
        "NACLs: ALLOW and DENY rules. Numbered, evaluated in order. Useful for blocking specific IPs.",
        "Security Groups: apply to specific instances. NACLs: apply to entire subnets.",
        "Troubleshooting connectivity: check BOTH security group AND NACL"
      ],
      tip:"Quick troubleshooting: If you can't connect to EC2: 1) Check Security Group inbound rules first. 2) Check NACL inbound AND outbound rules. 3) Check the OS firewall (iptables/firewalld) inside the instance. Go layer by layer.",
      warn:"Ephemeral ports: clients connect on low ports (80, 443) but responses come back on HIGH ports (1024-65535). NACLs are stateless so you MUST allow outbound 1024-65535 for responses to clients. Forgetting this blocks all responses even though you allowed the request."
    }
  ],
  code:`<span class="c"># ── CREATE VPC AND SUBNETS ───────────────────────────────────────</span>
<span class="c"># Create VPC with CIDR 10.0.0.0/16</span>
<span class="kw">VPC_ID</span>=$(aws ec2 create-vpc \
  <span class="fl">--cidr-block</span> <span class="str">10.0.0.0/16</span> \
  <span class="fl">--query</span> <span class="str">'Vpc.VpcId'</span> <span class="fl">--output</span> text)
<span class="cmd">echo</span> <span class="str">"VPC ID: $VPC_ID"</span>

<span class="c"># Enable DNS hostnames (needed for EC2 public DNS names)</span>
<span class="cmd">aws</span> ec2 modify-vpc-attribute \
  <span class="fl">--vpc-id</span> <span class="var">$VPC_ID</span> <span class="fl">--enable-dns-hostnames</span>

<span class="c"># Create PUBLIC subnet in AZ-1a</span>
<span class="kw">PUBLIC_SUBNET</span>=$(aws ec2 create-subnet \
  <span class="fl">--vpc-id</span> <span class="var">$VPC_ID</span> \
  <span class="fl">--cidr-block</span> <span class="str">10.0.1.0/24</span> \
  <span class="fl">--availability-zone</span> us-east-1a \
  <span class="fl">--query</span> <span class="str">'Subnet.SubnetId'</span> <span class="fl">--output</span> text)

<span class="c"># Create PRIVATE subnet in AZ-1b</span>
<span class="kw">PRIVATE_SUBNET</span>=$(aws ec2 create-subnet \
  <span class="fl">--vpc-id</span> <span class="var">$VPC_ID</span> \
  <span class="fl">--cidr-block</span> <span class="str">10.0.2.0/24</span> \
  <span class="fl">--availability-zone</span> us-east-1b \
  <span class="fl">--query</span> <span class="str">'Subnet.SubnetId'</span> <span class="fl">--output</span> text)

<span class="c"># Create and attach Internet Gateway</span>
<span class="kw">IGW_ID</span>=$(aws ec2 create-internet-gateway \
  <span class="fl">--query</span> <span class="str">'InternetGateway.InternetGatewayId'</span> <span class="fl">--output</span> text)
<span class="cmd">aws</span> ec2 attach-internet-gateway \
  <span class="fl">--internet-gateway-id</span> <span class="var">$IGW_ID</span> <span class="fl">--vpc-id</span> <span class="var">$VPC_ID</span>

<span class="c"># Create Public Route Table: 0.0.0.0/0 → IGW</span>
<span class="kw">PUBLIC_RT</span>=$(aws ec2 create-route-table \
  <span class="fl">--vpc-id</span> <span class="var">$VPC_ID</span> <span class="fl">--query</span> <span class="str">'RouteTable.RouteTableId'</span> <span class="fl">--output</span> text)
<span class="cmd">aws</span> ec2 create-route \
  <span class="fl">--route-table-id</span> <span class="var">$PUBLIC_RT</span> \
  <span class="fl">--destination-cidr-block</span> <span class="str">0.0.0.0/0</span> \
  <span class="fl">--gateway-id</span> <span class="var">$IGW_ID</span>
<span class="cmd">aws</span> ec2 associate-subnet-with-route-table \
  <span class="fl">--subnet-id</span> <span class="var">$PUBLIC_SUBNET</span> <span class="fl">--route-table-id</span> <span class="var">$PUBLIC_RT</span>

<span class="c"># ── NAT GATEWAY ─────────────────────────────────────────────────</span>
<span class="c"># Allocate Elastic IP for NAT Gateway</span>
<span class="kw">EIP_ID</span>=$(aws ec2 allocate-address \
  <span class="fl">--domain</span> vpc <span class="fl">--query</span> <span class="str">'AllocationId'</span> <span class="fl">--output</span> text)

<span class="c"># Create NAT Gateway in PUBLIC subnet</span>
<span class="kw">NAT_GW</span>=$(aws ec2 create-nat-gateway \
  <span class="fl">--subnet-id</span> <span class="var">$PUBLIC_SUBNET</span> \
  <span class="fl">--allocation-id</span> <span class="var">$EIP_ID</span> \
  <span class="fl">--query</span> <span class="str">'NatGateway.NatGatewayId'</span> <span class="fl">--output</span> text)

<span class="c"># Wait for NAT Gateway to become available</span>

<span class="cmd">aws</span> ec2 wait nat-gateway-available <span class="fl">--nat-gateway-ids</span> <span class="var">$NAT_GW</span>
<span class="cmd">echo</span> <span class="str">"NAT Gateway ready!"</span>

<span class="c"># Create Private Route Table: 0.0.0.0/0 → NAT Gateway</span>
<span class="kw">PRIVATE_RT</span>=$(aws ec2 create-route-table \
  <span class="fl">--vpc-id</span> <span class="var">$VPC_ID</span> <span class="fl">--query</span> <span class="str">'RouteTable.RouteTableId'</span> <span class="fl">--output</span> text)
<span class="cmd">aws</span> ec2 create-route \
  <span class="fl">--route-table-id</span> <span class="var">$PRIVATE_RT</span> \
  <span class="fl">--destination-cidr-block</span> <span class="str">0.0.0.0/0</span> \
  <span class="fl">--nat-gateway-id</span> <span class="var">$NAT_GW</span>
<span class="cmd">aws</span> ec2 associate-subnet-with-route-table \
  <span class="fl">--subnet-id</span> <span class="var">$PRIVATE_SUBNET</span> <span class="fl">--route-table-id</span> <span class="var">$PRIVATE_RT</span>

<span class="c"># ── SECURITY GROUP ───────────────────────────────────────────────</span>
<span class="c"># Create security group for web servers</span>
<span class="kw">SG_ID</span>=$(aws ec2 create-security-group \
  <span class="fl">--group-name</span> WebServerSG \
  <span class="fl">--description</span> <span class="str">"Allow HTTP and SSH"</span> \
  <span class="fl">--vpc-id</span> <span class="var">$VPC_ID</span> \
  <span class="fl">--query</span> <span class="str">'GroupId'</span> <span class="fl">--output</span> text)

<span class="c"># Allow HTTP from anywhere</span>
<span class="cmd">aws</span> ec2 authorize-security-group-ingress \
  <span class="fl">--group-id</span> <span class="var">$SG_ID</span> \
  <span class="fl">--protocol</span> tcp <span class="fl">--port</span> <span class="num">80</span> <span class="fl">--cidr</span> <span class="str">0.0.0.0/0</span>

<span class="c"># Allow SSH from YOUR IP only (replace with your IP)</span>
<span class="kw">MY_IP</span>=$(curl -s ifconfig.me)
<span class="cmd">aws</span> ec2 authorize-security-group-ingress \
  <span class="fl">--group-id</span> <span class="var">$SG_ID</span> \
  <span class="fl">--protocol</span> tcp <span class="fl">--port</span> <span class="num">22</span> <span class="fl">--cidr</span> <span class="var">${MY_IP}</span>/32

<span class="c"># ── TEST PRIVATE INSTANCE INTERNET ACCESS ───────────────────────</span>
<span class="c"># SSH to private instance via bastion (public instance)</span>
<span class="cmd">ssh</span> <span class="fl">-A</span> <span class="fl">-i</span> mykey.pem ec2-user@<span class="var">BASTION_PUBLIC_IP</span>  <span class="c"># -A forwards SSH agent</span>
<span class="cmd">ssh</span> ec2-user@<span class="var">PRIVATE_INSTANCE_IP</span>  <span class="c"># from bastion, jump to private</span>
<span class="c"># Test: this should show the NAT Gateway's Elastic IP</span>
<span class="cmd">curl</span> https://ifconfig.me`,
  note:"The difference between Security Group and NACL in one sentence: Security Group is like a bouncer at the door of EACH INSTANCE (stateful, remembers who it let in). NACL is like a checkpoint at the ENTRANCE OF EACH SUBNET (stateless, doesn't remember, checks both directions).",
  quiz:[
    {q:"Your EC2 instance in a private subnet can't download yum updates. NAT Gateway is created but updates still fail. What is likely missing?",opts:["The EC2 instance needs a public IP","The private subnet's route table doesn't have a route to the NAT Gateway","The NAT Gateway needs to be in the private subnet","EC2 instances can't use NAT Gateway"],a:1,e:"Creating a NAT Gateway doesn't automatically route traffic through it. You must add a route in the PRIVATE subnet's route table: 0.0.0.0/0 → nat-gateway-id. Without this route, the private instance has no path to reach the NAT Gateway. Route tables don't update automatically."},
    {q:"You allow port 80 in a NACL inbound rule. Users still can't connect. What's missing?",opts:["Port 80 must be in the security group too","You must add an outbound rule allowing ephemeral ports 1024-65535","NACLs don't support port 80","You need to reboot the EC2 instance"],a:1,e:"NACLs are STATELESS — they check every packet independently, not as part of a connection. Allowing inbound port 80 lets the request IN, but the response goes to the client on a random high port (1024-65535). You must ALSO allow outbound 1024-65535 for responses to leave. Forgetting this makes connections appear to hang after the initial request."},
    {q:"What is the key architectural difference: Security Group vs NACL?",opts:["Security Groups cost money; NACLs are free","Security Groups are stateful (instance-level); NACLs are stateless (subnet-level)","NACLs are newer than Security Groups","Security Groups only work with EC2; NACLs work with all services"],a:1,e:"Security Groups: 1) Attached to individual EC2/RDS instances. 2) STATEFUL (if inbound is allowed, response is auto-allowed). 3) ALLOW rules only (no DENY). NACLs: 1) Attached to subnets (applies to ALL instances in subnet). 2) STATELESS (must explicitly allow both directions). 3) Both ALLOW and DENY rules. 4) Rules evaluated in number order — first match wins."}
  ]
},

  code:`<span class="c"># ── STEP 1: Create Hosted Zone ──────────────────────────────────</span>
<span class="c"># Create hosted zone for your domain</span>
<span class="kw">ZONE_ID</span>=$(aws route53 create-hosted-zone \
  <span class="fl">--name</span> example.com \
  <span class="fl">--caller-reference</span> $(date +%s) \
  <span class="fl">--query</span> <span class="str">'HostedZone.Id'</span> <span class="fl">--output</span> text | cut -d/ -f3)
<span class="cmd">echo</span> <span class="str">"Zone ID: $ZONE_ID"</span>

<span class="c"># Get the nameservers to set at your registrar</span>
<span class="cmd">aws</span> route53 get-hosted-zone <span class="fl">--id</span> <span class="var">$ZONE_ID</span> \
  <span class="fl">--query</span> <span class="str">'DelegationSet.NameServers'</span>
<span class="c"># Copy these 4 nameservers to your domain registrar!</span>

<span class="c"># ── STEP 2: Create DNS Records ──────────────────────────────────</span>
<span class="c"># Create A record: www.example.com → EC2 IP</span>
<span class="cmd">aws</span> route53 change-resource-record-sets \
  <span class="fl">--hosted-zone-id</span> <span class="var">$ZONE_ID</span> \
  <span class="fl">--change-batch</span> <span class="str">'{
    "Changes": [{
      "Action": "CREATE",
      "ResourceRecordSet": {
        "Name": "www.example.com",
        "Type": "A",
        "TTL": 300,
        "ResourceRecords": [{"Value": "1.2.3.4"}]
      }
    }]
  }'</span>

<span class="c"># Create Alias record: example.com → ALB (no TTL for Alias records)</span>
<span class="cmd">aws</span> route53 change-resource-record-sets \
  <span class="fl">--hosted-zone-id</span> <span class="var">$ZONE_ID</span> \
  <span class="fl">--change-batch</span> <span class="str">'{
    "Changes": [{
      "Action": "CREATE",
      "ResourceRecordSet": {
        "Name": "example.com",
        "Type": "A",
        "AliasTarget": {
          "HostedZoneId": "Z35SXDOTRQ7X7K",
          "DNSName": "my-alb-1234.us-east-1.elb.amazonaws.com",
          "EvaluateTargetHealth": true

<span class="c"># ── STEP 3: Request ACM Certificate ─────────────────────────────</span>
<span class="c"># IMPORTANT: MUST use --region us-east-1 for CloudFront!</span>
<span class="kw">CERT_ARN</span>=$(aws acm request-certificate \

  <span class="fl">--validation-method</span> DNS \
  <span class="fl">--region</span> us-east-1 \
  <span class="fl">--query</span> <span class="str">'CertificateArn'</span> <span class="fl">--output</span> text)
<span class="cmd">echo</span> <span class="str">"Certificate ARN: $CERT_ARN"</span>

<span class="c"># Check certificate status (wait for ISSUED)</span>
<span class="cmd">aws</span> acm describe-certificate \
  <span class="fl">--certificate-arn</span> <span class="var">$CERT_ARN</span> \
  <span class="fl">--region</span> us-east-1 \
  <span class="fl">--query</span> <span class="str">'Certificate.Status'</span>

<span class="c"># ── STEP 4: Create CloudFront Distribution ──────────────────────</span>

      "Items": [{

  }'</span>

<span class="c"># ── Invalidate Cache after update ───────────────────────────────</span>
<span class="cmd">aws</span> cloudfront create-invalidation \

<span class="c"># ── DNS Troubleshooting Commands ─────────────────────────────────</span>

    {q:"You updated your S3 website files but CloudFront still serves old content. What is the fix?",opts:["Delete and recreate the CloudFront distribution","Create a CloudFront cache invalidation for '/*'","Change the S3 bucket name","Wait for the EC2 to restart"],a:1,e:"CloudFront caches files at edge locations for the TTL duration (default 24 hours or 86400 seconds). When you update origin files, edges keep serving the old cached version until TTL expires. Cache Invalidation immediately evicts specified files from all edge locations, forcing the next request to fetch fresh content from origin. First 1000 invalidation paths/month are free."}

    <div class="mod-nav">
      <button class="nav-btn2" onclick="show(${mi-1})" ${mi===0?'disabled':''}>← PREVIOUS</button>
      <button class="done-btn" id="dbtn-${mi}" onclick="markDone(${mi})">✓ MARK COMPLETE</button>
      <button class="nav-btn2" onclick="show(${mi+1})" ${mi===DATA.length-1?'disabled':''}>NEXT →</button>
    </div>`;
  main.appendChild(div);
});

function show(i){
  if(i<0||i>=DATA.length)return;
  document.querySelectorAll('.module').forEach(m=>m.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('mod-'+i).classList.add('active');
  document.getElementById('tab-'+i).classList.add('active');
  cur=i; window.scrollTo({top:0,behavior:'smooth'});
}
function toggleStep(mi,si){
  const card=document.getElementById(`sc-${mi}-${si}`);
  const tog=document.getElementById(`st-${mi}-${si}`);
  card.classList.toggle('open');
  tog.textContent=card.classList.contains('open')?'▲ CLOSE':'▼ EXPAND';
}
function answer(mi,qi,sel){
  const q=DATA[mi].quiz[qi];
  document.querySelectorAll(`[id^="opt-${mi}-${qi}-"]`).forEach(o=>o.disabled=true);
  document.getElementById(`opt-${mi}-${qi}-${sel}`).classList.add(sel===q.a?'right':'wrong');
  if(sel!==q.a) document.getElementById(`opt-${mi}-${qi}-${q.a}`).classList.add('right');
  document.getElementById(`exp-${mi}-${qi}`).classList.add('show');
  sel===q.a?crt++:wrg++;
  document.getElementById('sc1').textContent=crt;
  document.getElementById('sc2').textContent=wrg;
  document.getElementById('sc3').textContent=crt+wrg;
}
function markDone(mi){
  done.add(mi);
  const b=document.getElementById('dbtn-'+mi);
  b.textContent='✓ COMPLETED'; b.classList.add('marked');
  document.getElementById('tab-'+mi).classList.add('done');
  const pct=(done.size/DATA.length)*100;
  document.getElementById('pBar').style.width=pct+'%';
  document.getElementById('pLabel').textContent=`${done.size} / ${DATA.length} COMPLETED`;
}
function copyCode(mi){
  const pre=document.getElementById('codepre-'+mi);
  navigator.clipboard.writeText(pre.innerText).then(()=>{
    const b=document.getElementById('cpbtn-'+mi);
    b.textContent='COPIED!'; b.classList.add('ok');
    setTimeout(()=>{b.textContent='COPY ALL';b.classList.remove('ok');},2000);
  });
}
show(0);
</script>
</body>
</html>
