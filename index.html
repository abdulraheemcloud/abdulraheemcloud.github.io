<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Deep Dive — Every Step Explained</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Fraunces:ital,wght@0,300;0,600;0,900;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07090f;
  --surface: #0d1117;
  --card: #111927;
  --border: #1c2a3a;
  --border2: #243447;
  --orange: #ff6b2b;
  --orange-dim: rgba(255,107,43,0.12);
  --blue: #3b9eff;
  --blue-dim: rgba(59,158,255,0.1);
  --green: #00d084;
  --green-dim: rgba(0,208,132,0.1);
  --yellow: #ffd166;
  --yellow-dim: rgba(255,209,102,0.1);
  --purple: #b57bee;
  --red: #ff4d6d;
  --text: #dce8f5;
  --muted: #5a7a9a;
  --muted2: #3d5a73;
  --code: #c9d8e8;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
/* Subtle grid */
body::before{
  content:'';position:fixed;inset:0;
  background-image:radial-gradient(circle at 20% 50%, rgba(59,158,255,0.03) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(255,107,43,0.03) 0%, transparent 40%);
  pointer-events:none;z-index:0;
}

/* ── HEADER ── */
.site-header{
  position:relative;z-index:10;
  padding:70px 24px 50px;
  text-align:center;
  border-bottom:1px solid var(--border);
}
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--orange-dim);border:1px solid rgba(255,107,43,0.3);
  color:var(--orange);font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:2px;padding:6px 14px;margin-bottom:24px;
}
.eyebrow::before{content:'';width:6px;height:6px;background:var(--orange);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.site-header h1{
  font-family:'Fraunces',serif;font-size:clamp(40px,7vw,80px);
  font-weight:900;line-height:1;letter-spacing:-3px;margin-bottom:12px;
}
.site-header h1 em{
  font-style:italic;color:var(--orange);
}
.site-header p{
  color:var(--muted);font-size:15px;max-width:550px;
  margin:0 auto 32px;line-height:1.7;font-weight:300;
}
.progress-wrap{max-width:480px;margin:0 auto;}
.progress-track{height:3px;background:var(--border);position:relative;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--yellow));
  width:0%;transition:width .6s cubic-bezier(.4,0,.2,1);}
.progress-label{
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  color:var(--muted);margin-top:8px;letter-spacing:1px;
}

/* ── NAV TABS ── */
.tab-nav{
  position:sticky;top:0;z-index:100;
  background:rgba(7,9,15,0.96);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;
}
.tab-nav::-webkit-scrollbar{display:none;}
.tab-list{display:flex;min-width:max-content;}
.tab{
  background:none;border:none;color:var(--muted);
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  padding:16px 18px;cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .2s;white-space:nowrap;letter-spacing:.5px;
  position:relative;
}
.tab:hover{color:var(--text);}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.tab.done{color:var(--green);}
.tab.done::after{content:' ✓';}

/* ── MAIN ── */
main{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:40px 20px 100px;}

/* ── MODULE ── */
.module{display:none;animation:rise .35s ease;}
.module.active{display:block;}
@keyframes rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* Module hero */
.mod-hero{
  padding:36px 36px 28px;
  background:var(--surface);
  border:1px solid var(--border);
  border-top:2px solid var(--orange);
  margin-bottom:28px;
  position:relative;overflow:hidden;
}
.mod-hero::after{
  content:attr(data-num);
  position:absolute;right:-10px;top:-10px;
  font-family:'Fraunces',serif;font-size:140px;font-weight:900;
  color:rgba(255,107,43,0.04);line-height:1;pointer-events:none;
  user-select:none;
}
.mod-label{
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  letter-spacing:2px;color:var(--orange);margin-bottom:12px;
}
.mod-hero h2{
  font-family:'Fraunces',serif;font-size:clamp(24px,4vw,38px);
  font-weight:900;letter-spacing:-1px;margin-bottom:14px;line-height:1.1;
}
.mod-hero .overview{
  color:#8aa8c4;font-size:14px;line-height:1.8;font-weight:300;
  max-width:680px;
}
.tag-row{margin-top:14px;display:flex;flex-wrap:wrap;gap:6px;}
.tag{
  font-family:'IBM Plex Mono',monospace;font-size:9px;
  letter-spacing:.5px;padding:4px 10px;
  background:var(--blue-dim);border:1px solid rgba(59,158,255,0.2);
  color:var(--blue);
}

/* Section */
.sec{margin-bottom:32px;}
.sec-head{
  display:flex;align-items:center;gap:10px;
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  letter-spacing:3px;color:var(--orange);text-transform:uppercase;
  margin-bottom:16px;padding-bottom:10px;
  border-bottom:1px solid var(--border);
}
.sec-head::before{content:'';display:block;width:14px;height:2px;background:var(--orange);}

/* WHY box — the key addition */
.why-box{
  background:var(--yellow-dim);
  border:1px solid rgba(255,209,102,0.2);
  border-left:3px solid var(--yellow);
  padding:14px 18px;margin-bottom:10px;
  font-size:13px;color:#d4b96a;line-height:1.7;
}
.why-box strong{
  display:block;font-family:'IBM Plex Mono',monospace;
  font-size:9px;letter-spacing:2px;color:var(--yellow);margin-bottom:6px;
}

/* Steps */
.step-card{
  background:var(--surface);border:1px solid var(--border);
  margin-bottom:12px;overflow:hidden;
}
.step-head{
  display:grid;grid-template-columns:52px 1fr auto;
  align-items:center;gap:0;cursor:pointer;
  padding:0;transition:background .2s;
}
.step-head:hover{background:rgba(59,158,255,0.03);}
.step-n{
  display:flex;align-items:center;justify-content:center;
  height:64px;
  background:var(--blue-dim);
  font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;
  color:var(--blue);border-right:1px solid var(--border);
  flex-shrink:0;
}
.step-summary{padding:16px 18px;}
.step-summary h4{font-size:14px;font-weight:600;margin-bottom:4px;}
.step-summary p{font-size:12px;color:var(--muted);line-height:1.5;}
.step-toggle{
  padding:0 18px;font-family:'IBM Plex Mono',monospace;
  font-size:10px;color:var(--muted);white-space:nowrap;
}
.step-body{
  display:none;
  border-top:1px solid var(--border);
  padding:0;
}
.step-card.open .step-body{display:block;}
.step-card.open .step-toggle{color:var(--orange);}

/* WHY panel */
.why-panel{
  padding:18px 20px 18px 24px;
  background:rgba(255,209,102,0.04);
  border-bottom:1px solid var(--border);
}
.why-panel .label{
  font-family:'IBM Plex Mono',monospace;font-size:9px;
  letter-spacing:2px;color:var(--yellow);margin-bottom:8px;
}
.why-panel p{font-size:13px;color:#b09060;line-height:1.75;}

/* How panel */
.how-panel{
  padding:18px 20px 20px 24px;
  background:rgba(59,158,255,0.03);
}
.how-panel .label{
  font-family:'IBM Plex Mono',monospace;font-size:9px;
  letter-spacing:2px;color:var(--blue);margin-bottom:8px;
}
.how-panel p{font-size:13px;color:#7fa8c8;line-height:1.75;margin-bottom:8px;}
.how-panel p:last-child{margin-bottom:0;}
.inline-cmd{
  display:inline-block;background:var(--bg);
  border:1px solid var(--border2);
  font-family:'IBM Plex Mono',monospace;font-size:11px;
  color:#00d084;padding:1px 7px;
}
.tip{
  margin-top:10px;padding:10px 14px;
  background:rgba(0,208,132,0.06);border-left:2px solid var(--green);
  font-size:12px;color:#5aa882;line-height:1.6;
}
.tip strong{color:var(--green);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;display:block;margin-bottom:4px;}
.warn{
  margin-top:10px;padding:10px 14px;
  background:rgba(255,77,109,0.07);border-left:2px solid var(--red);
  font-size:12px;color:#c07080;line-height:1.6;
}
.warn strong{color:var(--red);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;display:block;margin-bottom:4px;}

/* Code block */
.code-wrap{
  background:#04060c;
  border:1px solid var(--border);
  border-left:3px solid var(--green);
  position:relative;overflow:hidden;
}
.code-label{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;border-bottom:1px solid var(--border);
}
.code-label span{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);}
.copy-btn{
  background:none;border:1px solid var(--border2);
  color:var(--muted);font-family:'IBM Plex Mono',monospace;
  font-size:9px;letter-spacing:1px;padding:3px 10px;cursor:pointer;
  transition:all .2s;
}
.copy-btn:hover{border-color:var(--green);color:var(--green);}
.copy-btn.ok{color:var(--green);border-color:var(--green);}
.code-scroll{overflow-x:auto;padding:20px 20px 20px 20px;}
pre{
  font-family:'IBM Plex Mono',monospace;font-size:12px;
  line-height:1.9;white-space:pre;color:#6a8faa;
}
.c{color:#344a5e;font-style:italic;}  /* comment */
.cmd{color:#00d084;}                   /* command */
.fl{color:#ff6b2b;}                    /* flag */
.str{color:#ffd166;}                   /* string */
.kw{color:#b57bee;}                    /* keyword */
.var{color:#3b9eff;}                   /* variable */
.num{color:#ff9f66;}                   /* number */

/* Note */
.note{
  background:rgba(255,77,109,0.06);
  border:1px solid rgba(255,77,109,0.2);
  border-left:3px solid var(--red);
  padding:16px 20px;margin-top:4px;
}
.note strong{display:block;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--red);margin-bottom:8px;}
.note p{font-size:13px;color:#b07080;line-height:1.7;}

/* Quiz */
.quiz-wrap{
  background:var(--surface);
  border:1px solid var(--border);
  padding:28px;
}
.quiz-title{
  font-family:'Fraunces',serif;font-size:20px;font-weight:600;
  margin-bottom:6px;
}
.quiz-sub{font-size:12px;color:var(--muted);margin-bottom:24px;}
.q-block{
  margin-bottom:28px;padding-bottom:24px;
  border-bottom:1px solid var(--border);
}
.q-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.q-text{
  font-size:14px;font-weight:500;line-height:1.5;margin-bottom:14px;
}
.q-num{font-family:'IBM Plex Mono',monospace;color:var(--purple);margin-right:8px;font-size:12px;}
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{
  display:flex;align-items:flex-start;gap:12px;
  width:100%;background:var(--bg);
  border:1px solid var(--border);
  padding:11px 15px;cursor:pointer;
  transition:all .2s;font-size:13px;
  color:var(--muted);text-align:left;line-height:1.4;
}
.opt:hover:not(:disabled){
  border-color:var(--purple);color:var(--text);
  background:rgba(181,123,238,0.05);
}
.opt-l{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--purple);flex-shrink:0;font-weight:600;}
.opt.right{border-color:var(--green)!important;background:rgba(0,208,132,0.07)!important;color:var(--green)!important;}
.opt.wrong{border-color:var(--red)!important;background:rgba(255,77,109,0.07)!important;color:var(--red)!important;}
.opt:disabled{cursor:default;}
.q-exp{
  display:none;margin-top:12px;
  padding:12px 16px;
  background:rgba(59,158,255,0.05);
  border-left:2px solid var(--blue);
  font-size:12px;color:#6a8faa;line-height:1.7;
}
.q-exp.show{display:block;}
.q-exp strong{color:var(--blue);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;display:block;margin-bottom:5px;}

/* Bottom nav */
.mod-nav{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:40px;padding-top:24px;border-top:1px solid var(--border);
}
.nav-btn2{
  background:none;border:1px solid var(--border);
  color:var(--muted);font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:1px;padding:10px 22px;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;
}
.nav-btn2:hover:not(:disabled){border-color:var(--orange);color:var(--orange);}
.nav-btn2:disabled{opacity:.25;cursor:default;}
.done-btn{
  background:var(--green-dim);border:1px solid rgba(0,208,132,0.3);
  color:var(--green);font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:1px;padding:10px 22px;
  cursor:pointer;transition:all .2s;
}
.done-btn:hover{background:rgba(0,208,132,0.18);}
.done-btn.marked{opacity:.45;cursor:default;}

/* Score */
.score-pill{
  position:fixed;bottom:24px;right:24px;z-index:200;
  background:var(--card);border:1px solid var(--border);
  padding:12px 20px;display:flex;gap:18px;align-items:center;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.sc{display:flex;flex-direction:column;align-items:center;gap:2px;}
.sv{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;}
.sl{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--muted);}
.sv.g{color:var(--green);}
.sv.r{color:var(--red);}
.sv.b{color:var(--blue);}

/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);}
</style>
</head>
<body>

<header class="site-header">
  <div class="eyebrow">AWS DEEP DIVE GUIDE</div>
  <h1>Every Step<br><em>Explained</em></h1>
  <p>Why we do it. How it works. What each command means. Complete hands-on guide with Linux, Apache, Nginx, EC2, Load Balancer, Auto Scaling & more.</p>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="pBar"></div></div>
    <div class="progress-label" id="pLabel">0 / 12 COMPLETED</div>
  </div>
</header>

<nav class="tab-nav"><div class="tab-list" id="tabList"></div></nav>
<main id="main"></main>

<div class="score-pill">
  <div class="sc"><div class="sv g" id="sc1">0</div><div class="sl">CORRECT</div></div>
  <div class="sc"><div class="sv r" id="sc2">0</div><div class="sl">WRONG</div></div>
  <div class="sc"><div class="sv b" id="sc3">0</div><div class="sl">TOTAL</div></div>
</div>

<script>
const DATA = [
// ═══════════════════════════════════════════════════════════════════
// MODULE 1 — EC2 DEEP DIVE
// ═══════════════════════════════════════════════════════════════════
{
  id:1, title:"EC2 — Launch Instance", icon:"💻",
  tags:["Compute","Virtual Machine","SSH","Instance Types"],
  overview:"EC2 (Elastic Compute Cloud) is a virtual computer running in AWS data center. Instead of buying a physical server (which costs $10,000+), you rent one from AWS for as low as $0.01/hour and get it running in 60 seconds. You choose the OS, CPU, RAM, storage. You can stop it, restart it, resize it anytime.",
  why:"EC2 is the FOUNDATION of everything in AWS. Websites, APIs, databases, batch jobs — they all run on EC2 instances. Without EC2, you have no server to run your application. Understanding EC2 first makes every other AWS service make sense.",
  steps:[
    {
      n:"01", title:"Launch Instance — Why & How",
      short:"Starting your virtual computer in AWS",
      why:"You need a computer to run your application. You cannot install Apache or Nginx without a server. Launching an EC2 instance gives you that server — just like turning on a physical computer, except this one is in AWS's data center and you access it over the internet.",
      how:[
        "Go to AWS Console → EC2 → Click orange 'Launch Instance' button",
        "Give it a Name like 'MyWebServer' — this is just a label so YOU can find it later among 100s of instances. AWS uses this as a tag.",
        "Choose AMI (Amazon Machine Image) = the Operating System. Amazon Linux 2 is recommended for beginners — it comes with AWS tools pre-installed.",
        "Choose Instance Type = how powerful your computer is. t2.micro = 1 CPU + 1GB RAM. Free tier eligible. Good for learning and small apps.",
        "Create Key Pair = this is your SSH password (but better). Without this, you CANNOT login to your server. Download the .pem file and NEVER lose it.",
        "Configure Security Group = firewall rules. Allow SSH (port 22) so you can login. Allow HTTP (port 80) so users can visit your website."
      ],
      tip:"Name your instances clearly! 'prod-web-server-1' is better than 'MyInstance'. In real jobs you may have 50+ instances — good naming saves time.",
      warn:"NEVER allow SSH (port 22) from 0.0.0.0/0 (all internet). Only allow it from YOUR IP address. Hackers constantly scan port 22 to break in."
    },
    {
      n:"02", title:"SSH Into EC2 — What It Means",
      short:"Logging into your remote server from your Linux terminal",
      why:"Your EC2 instance is a computer in Virginia (or wherever your region is). You are sitting in Chennai. SSH (Secure Shell) lets you control that remote computer FROM your terminal as if you were sitting right in front of it. Every command you type gets sent over an encrypted tunnel to the server.",
      how:[
        "chmod 400 mykey.pem — This sets the key file permission to 'only I can read it'. SSH refuses to work if your key file is readable by other users. Think of it as locking your house key in a safe.",
        "ssh -i mykey.pem ec2-user@1.2.3.4 — This command means: connect via SSH, use this key file (-i), login as user 'ec2-user', to server at IP 1.2.3.4",
        "ec2-user is the default username for Amazon Linux. Ubuntu = ubuntu, RHEL = ec2-user, Debian = admin.",
        "After connecting, you'll see a prompt like: [ec2-user@ip-10-0-1-5 ~]$ — You are now INSIDE the remote server!"

      tip:"SSH uses port 22. The traffic is fully encrypted — nobody can intercept what you type. Your key pair works like public-key cryptography: AWS has your public key, you have the private key (.pem file).",

    },
    {
      n:"03", title:"Install Apache Web Server",
      short:"Installing and starting Apache (httpd) on your EC2 instance",
      why:"An EC2 instance is just a blank computer. It cannot serve websites by itself. Apache (httpd) is a web server software that listens on port 80 and serves your HTML files to anyone who visits your server's IP address in a browser. This is how websites work.",
      how:[
        "sudo yum update -y  →  Download and install all the latest security patches. Always do this first on a new server. 'yum' is the package manager for Amazon Linux (like an app store). '-y' means 'yes to all prompts'.",
        "sudo yum install -y httpd  →  Download and install Apache web server. 'httpd' is Apache's package name in Amazon Linux.",
        "sudo systemctl start httpd  →  Actually START the Apache service. Installing a program does not start it automatically — you must start it.",
        "sudo systemctl enable httpd  →  Make Apache auto-start every time the server restarts. Without this, after a reboot your website goes down.",
        "sudo systemctl status httpd  →  Check if Apache is running. Look for 'active (running)' in green."

      warn:"If your browser can't reach the page: check Security Group has port 80 (HTTP) open. Also check Apache is running with 'sudo systemctl status httpd'."
    },
    {
      n:"04", title:"Install Nginx Web Server",
      short:"Installing Nginx — a faster, modern alternative to Apache",
      why:"Nginx (pronounced 'engine-x') is another web server — faster and more memory-efficient than Apache. Used by Netflix, Dropbox, WordPress.com. While Apache handles one request per thread, Nginx handles thousands of requests with a tiny memory footprint using an event-driven model. In real companies, Nginx is often used as a reverse proxy in front of applications.",
      how:[
        "sudo amazon-linux-extras install nginx1  →  On Amazon Linux 2, Nginx is in the 'extras' repo. This command enables and installs it.",
        "sudo systemctl start nginx  →  Start the Nginx service",
        "sudo systemctl enable nginx  →  Auto-start on reboot",
        "sudo systemctl status nginx  →  Verify it's running",
        "Nginx serves files from /usr/share/nginx/html/ by default",

  code:`<span class="c"># ── STEP 1: Connect to EC2 ──────────────────────────────────────</span>
<span class="c"># First, set correct permissions on your key file</span>
<span class="c"># chmod = change mode, 400 = only owner can read (no write, no execute)</span>
<span class="cmd">chmod</span> <span class="num">400</span> mykey.pem

<span class="c"># SSH into your EC2 instance</span>
<span class="c"># -i = identity file (your key), ec2-user = username for Amazon Linux</span>

<span class="c"># ── STEP 2: Update server ───────────────────────────────────────</span>
<span class="c"># yum = package manager (like apt on Ubuntu), -y = yes to all</span>

<span class="c"># ── STEP 3: Install Apache (httpd) ─────────────────────────────</span>
<span class="c"># httpd is Apache's package name on Amazon Linux</span>
<span class="cmd">sudo</span> yum install <span class="fl">-y</span> httpd

<span class="c"># Start Apache RIGHT NOW</span>
<span class="cmd">sudo</span> systemctl start httpd

<span class="c"># Make Apache start AUTOMATICALLY after every reboot</span>
<span class="cmd">sudo</span> systemctl enable httpd

<span class="c"># Check if Apache is running (look for 'active (running)')</span>
<span class="cmd">sudo</span> systemctl status httpd

<span class="c"># Create a test webpage</span>
<span class="c"># echo = print text, | = send to next command, tee = write to file</span>
<span class="cmd">echo</span> <span class="str">"&lt;h1&gt;Hello from $(hostname)&lt;/h1&gt;"</span> | <span class="cmd">sudo</span> tee /var/www/html/index.html

<span class="c"># ── STEP 4: Install Nginx (alternative) ────────────────────────</span>

<span class="cmd">sudo</span> systemctl start nginx
<span class="cmd">sudo</span> systemctl enable nginx
<span class="cmd">sudo</span> systemctl status nginx

<span class="c"># Create a test webpage for Nginx</span>
<span class="cmd">echo</span> <span class="str">"&lt;h1&gt;Hello from Nginx on $(hostname)&lt;/h1&gt;"</span> | <span class="cmd">sudo</span> tee /usr/share/nginx/html/index.html

<span class="c"># ── USEFUL COMMANDS ─────────────────────────────────────────────</span>
<span class="c"># Check which process is using port 80</span>

<span class="c"># View Apache access logs (who visited your site)</span>

<span class="c"># View Nginx access logs</span>

<span class="c"># Check disk space on your server</span>
<span class="cmd">df</span> <span class="fl">-h</span>

<span class="c"># Check RAM usage</span>
<span class="cmd">free</span> <span class="fl">-h</span>

<span class="c"># Check CPU usage (press q to quit)</span>
<span class="cmd">top</span>`,

    {q:"What does 'sudo systemctl enable httpd' do differently from 'sudo systemctl start httpd'?",opts:["enable installs Apache; start just downloads it","start runs Apache now; enable makes it auto-start on every reboot","They do the same thing","enable is for Nginx; start is for Apache"],a:1,e:"'start' runs the service RIGHT NOW in the current session. 'enable' configures systemd to automatically start the service every time the OS boots. You need BOTH: start for right now, enable for persistence across reboots."},

  code:`<span class="c"># ── STEP 1: Create User Data script for web servers ─────────────</span>
<span class="c"># This script runs automatically when EC2 launches</span>
<span class="cmd">cat</span> > userdata.sh <span class="str">&lt;&lt;'SCRIPT'</span>

<span class="c"># Update the system first</span>

<span class="c"># ── STEP 2: Create Target Group ─────────────────────────────────</span>

    {q:"What is the difference between ALB (Application Load Balancer) and NLB (Network Load Balancer)?",opts:["Only the price is different","ALB = Layer 7 (HTTP/HTTPS, path-based routing); NLB = Layer 4 (TCP/UDP, ultra-high performance)","NLB is older and deprecated","ALB handles more traffic than NLB"],a:1,e:"ALB operates at Layer 7 (Application layer). It understands HTTP — can route based on URL path (/api vs /images), headers, host name. NLB operates at Layer 4 (TCP/UDP). It doesn't understand HTTP but handles MILLIONS of requests per second with microsecond latency. Use ALB for web apps, NLB for gaming, trading platforms, IoT."},

  overview:"Auto Scaling watches your EC2 instances and automatically adds more when traffic increases and removes them when traffic drops. It's like a smart restaurant manager: when it's lunch rush, he calls in extra staff. When the restaurant is quiet at 3PM, he sends some home. You only pay for what you use, and your app never crashes under load.",

  code:`<span class="c"># ── STEP 1: Create User Data Script for Launch Template ─────────</span>
<span class="cmd">cat</span> > lt_userdata.sh <span class="str">&lt;&lt;'SCRIPT'</span>
#!/bin/bash
yum update -y
yum install -y httpd stress
systemctl start httpd
systemctl enable httpd
<span class="c"># Show instance metadata on the webpage</span>
INSTANCE_ID=$(curl -s http://169.254.169.254/latest/meta-data/instance-id)
AZ=$(curl -s http://169.254.169.254/latest/meta-data/placement/availability-zone)
<span class="cmd">echo</span> "&lt;h1&gt;Instance: $INSTANCE_ID&lt;br&gt;AZ: $AZ&lt;/h1&gt;" &gt; /var/www/html/index.html
<span class="str">SCRIPT</span>

<span class="c"># Base64 encode the user data (required for Launch Template)</span>
<span class="kw">UD_BASE64</span>=$(base64 -w0 lt_userdata.sh)

<span class="c"># ── Create Launch Template ──────────────────────────────────────</span>
<span class="cmd">aws</span> ec2 create-launch-template \
  <span class="fl">--launch-template-name</span> WebServerTemplate \
  <span class="fl">--version-description</span> <span class="str">"v1 - Apache web server"</span> \
  <span class="fl">--launch-template-data</span> <span class="str">'{
    "ImageId": "ami-0c55b159cbfafe1f0",
    "InstanceType": "t2.micro",
    "KeyName": "mykey",
    "SecurityGroupIds": ["sg-XXXXXXXX"],
    "UserData": "'</span><span class="var">$UD_BASE64</span><span class="str">'"
  }'</span>

<span class="c"># ── STEP 2: Create Auto Scaling Group ──────────────────────────</span>
<span class="cmd">aws</span> autoscaling create-auto-scaling-group \
  <span class="fl">--auto-scaling-group-name</span> WebASG \
  <span class="fl">--launch-template</span> <span class="str">"LaunchTemplateName=WebServerTemplate,Version=\$Latest"</span> \
  <span class="fl">--min-size</span> <span class="num">1</span> \
  <span class="fl">--max-size</span> <span class="num">6</span> \
  <span class="fl">--desired-capacity</span> <span class="num">2</span> \
  <span class="fl">--vpc-zone-identifier</span> <span class="str">"subnet-AZ1a,subnet-AZ1b"</span> \
  <span class="fl">--target-group-arns</span> <span class="var">TARGET_GROUP_ARN</span> \
  <span class="fl">--health-check-type</span> ELB \
  <span class="fl">--health-check-grace-period</span> <span class="num">120</span>

<span class="c"># ── STEP 3: Create Target Tracking Scaling Policy ───────────────</span>
<span class="c"># Keep average CPU at 50%</span>
<span class="cmd">aws</span> autoscaling put-scaling-policy \
  <span class="fl">--auto-scaling-group-name</span> WebASG \
  <span class="fl">--policy-name</span> cpu-50-percent \
  <span class="fl">--policy-type</span> TargetTrackingScaling \
  <span class="fl">--target-tracking-configuration</span> <span class="str">'{
    "PredefinedMetricSpecification": {
      "PredefinedMetricType": "ASGAverageCPUUtilization"
    },
    "TargetValue": 50.0,
    "ScaleInCooldown": 300,
    "ScaleOutCooldown": 60
  }'</span>

<span class="c"># ── STEP 4: Stress Test to Trigger Scale-Out ───────────────────</span>
<span class="c"># SSH into one of the ASG instances</span>
<span class="cmd">ssh</span> <span class="fl">-i</span> mykey.pem ec2-user@<span class="var">ASG_INSTANCE_IP</span>

<span class="c"># Run stress test — max out all 4 CPUs for 5 minutes</span>
<span class="c"># --cpu 4 = use 4 worker threads (1 per CPU core)</span>
<span class="c"># --timeout 300 = run for 300 seconds then stop</span>
<span class="cmd">stress</span> <span class="fl">--cpu</span> <span class="num">4</span> <span class="fl">--timeout</span> <span class="num">300</span>

<span class="c"># In another terminal — watch ASG add instances</span>
<span class="kw">while</span> true; <span class="kw">do</span>
  <span class="cmd">aws</span> autoscaling describe-auto-scaling-groups \
    <span class="fl">--auto-scaling-group-name</span> WebASG \
    <span class="fl">--query</span> <span class="str">'AutoScalingGroups[0].Instances[*].[InstanceId,LifecycleState]'</span> \
    <span class="fl">--output</span> table
  sleep <span class="num">10</span>
<span class="kw">done</span>

<span class="c"># ── MONITORING COMMANDS ─────────────────────────────────────────</span>
<span class="c"># Check current instance count in ASG</span>
<span class="cmd">aws</span> autoscaling describe-auto-scaling-groups \
  <span class="fl">--auto-scaling-group-name</span> WebASG \
  <span class="fl">--query</span> <span class="str">'AutoScalingGroups[0].{Min:MinSize,Desired:DesiredCapacity,Max:MaxSize,Count:length(Instances)}'</span>

<span class="c"># View scaling activity history</span>
<span class="cmd">aws</span> autoscaling describe-scaling-activities \
  <span class="fl">--auto-scaling-group-name</span> WebASG \
  <span class="fl">--max-records</span> <span class="num">10</span> \
  <span class="fl">--output</span> table

<span class="c"># Manually set desired capacity (immediate scale up)</span>
<span class="cmd">aws</span> autoscaling set-desired-capacity \
  <span class="fl">--auto-scaling-group-name</span> WebASG \
  <span class="fl">--desired-capacity</span> <span class="num">4</span> \
  <span class="fl">--honor-cooldown</span>`,
  note:"Health Check Grace Period (120 seconds): After an instance launches, Auto Scaling waits this long before checking its health. This gives the instance time to run User Data and start Apache. Without grace period, the instance gets marked unhealthy before it finishes starting up and gets immediately replaced in a loop!",
  quiz:[
    {q:"ASG min=2, max=6, desired=2. It's 3AM and CPU drops to 5%. What happens?",opts:["ASG terminates all instances","ASG terminates instances until min=2 is reached (already there, so nothing changes)","ASG scales to 0 instances","ASG increases desired to 4"],a:1,e:"The ASG already has the minimum number of instances (2). Even with 0% CPU, it will NOT go below min=2. Min size guarantees you always have at least 2 servers running. If desired was 4 and CPU dropped, scaling in would reduce to min=2, but not below."},
    {q:"What is the purpose of the Health Check Grace Period in Auto Scaling?",opts:["Period to check payment status","Time given to an instance after launch before ASG starts checking its health","Time between scaling events","Minimum runtime before termination"],a:1,e:"When a new instance launches, it takes time to run User Data (install Apache, start services, etc.). The grace period (e.g., 120 seconds) tells Auto Scaling: 'wait this long before checking health'. Without it, Auto Scaling checks immediately, sees the instance is still initializing, marks it unhealthy, terminates it, and launches another one — infinite loop!"},
    {q:"What does 'ScaleInCooldown: 300' mean in a scaling policy?",opts:["Scale IN only runs for 300 seconds total","After scaling IN, wait 300 seconds before scaling again","Scale IN if CPU > 300%","Maximum of 300 instances can be terminated"],a:1,e:"Cooldown prevents rapid add/remove cycles ('flapping'). After a Scale-In event (removing instances), wait 300 seconds before allowing another scaling event. This lets metrics stabilize after the change. ScaleOutCooldown is typically shorter (60 seconds) because you want to react quickly to load spikes."},
    {q:"You terminate an EC2 instance that belongs to an ASG. What happens?",opts:["The ASG is deleted","Nothing happens","The ASG automatically launches a replacement instance to maintain desired capacity","You get a bill for the terminated instance"],a:2,e:"This is Auto Scaling's self-healing capability! ASG continuously monitors instance count against desired capacity. When an instance is terminated (even manually, or by a crash), ASG detects the count dropped below desired and immediately launches a replacement. This is why production systems rarely have downtime even with hardware failures."}
  ]
},

// MODULE 4 — S3 DEEP DIVE
// ═══════════════════════════════════════════════════════════════════
{
  id:4, title:"S3 — Storage Deep Dive", icon:"🪣",
  tags:["Object Storage","Buckets","Static Website","Versioning"],
  overview:"S3 (Simple Storage Service) is like Google Drive but for your applications. You upload files (called objects) into containers (called buckets). S3 can store any type of file — images, videos, code, backups, logs. It scales infinitely, stores data across multiple data centers automatically, and gives 99.999999999% (11 nines) durability.",
  why:"S3 is the most used AWS service. It's used for: storing website assets (images, CSS, JS), application backups, data lakes for analytics, static website hosting, storing EC2 snapshots, CloudFront origin. Understanding S3 deeply is essential for any AWS role.",
  steps:[
    {
      n:"01", title:"S3 Bucket — Why Create It & What's the Name Rule?",
      short:"Creating your storage container with a globally unique name",
      why:"A bucket is a container for your files. Think of it like a folder, but accessible via URL from anywhere in the world. You MUST create a bucket before uploading anything. The bucket name forms part of the URL, so it must be globally unique — no two people in the world can have the same bucket name.",
      how:[
        "S3 Console → Create Bucket → Enter a GLOBALLY UNIQUE name",
        "Why globally unique? Because the bucket URL is: https://BUCKET-NAME.s3.amazonaws.com — if names could repeat, URLs would conflict",
        "Name rules: 3-63 chars, lowercase only, no capital letters, no spaces, no underscores, can use hyphens",
        "Good name: company-name-logs-2024. Bad name: My_Bucket (capital, underscore — invalid)",
        "Choose Region: closer to users = lower latency. Once created, you cannot change the region",
        "Block Public Access: LEAVE IT ON by default. Only disable if you specifically need public access"
      ],
      tip:"Use a consistent naming convention: company-project-purpose-environment. Example: myapp-prod-assets, myapp-dev-logs, myapp-staging-backups. This makes it easy to find buckets and set billing alerts per project.",
      warn:"Bucket names are GLOBAL. Once you create 'my-bucket', nobody else in the world can create 'my-bucket' in any region. Choose names carefully — you cannot rename a bucket after creation."
    },
    {
      n:"02", title:"Upload Files — What Each CLI Command Does",
      short:"Uploading files to S3 using the AWS CLI",
      why:"You put files in S3 so they can be: accessed by your EC2 instances, distributed globally via CloudFront, stored as backups, or served as a static website. The CLI is much faster than the console for uploading many files.",
      how:[
        "aws s3 cp = copy. Like the 'cp' Linux command but between local and S3",
        "aws s3 sync = smart copy. Compares local and S3, only transfers NEW or CHANGED files. Perfect for website deployments",
        "aws s3 ls = list. Show contents of a bucket",
        "aws s3 rm = remove. Delete a file from S3",
        "s3:// prefix tells the CLI this is an S3 path (not a local path)"
      ],
      tip:"Use 'aws s3 sync' for website deployments — it's like rsync but for S3. Add --delete flag to remove files in S3 that no longer exist locally. Add --exclude and --include for pattern matching.",
      warn:"S3 PUT operations are eventually consistent for overwrites. If you overwrite a file, some requests may get the old version for a short time. For versioning-enabled buckets, both old and new versions are kept."
    },
    {
      n:"03", title:"Bucket Policy — Controlling Who Can Access Your Files",
      short:"Writing JSON permissions to control access to the entire bucket",
      why:"By default, NOBODY can access your S3 bucket except you (the bucket owner). If you want your EC2 instances to read from S3, or host a public website, you must explicitly grant that access using a bucket policy. It's a JSON document that says WHO can do WHAT to WHICH files.",
      how:[
        "Effect: 'Allow' or 'Deny'",
        "Principal: WHO gets this permission. '*' = everyone. 'arn:aws:iam::123:user/john' = specific user",
        "Action: WHAT can they do. 's3:GetObject' = read files. 's3:PutObject' = upload. 's3:*' = everything",
        "Resource: WHICH files. 'arn:aws:s3:::my-bucket/*' = all files in my-bucket",
        "For public website: allow s3:GetObject to Principal * on all objects",
        "FIRST: Disable 'Block Public Access' setting on the bucket, THEN add the policy"
      ],
      tip:"You can add DENY statements too. DENY always overrides ALLOW. Use this for: blocking specific IPs, preventing deletes in production, enforcing encryption.",
      warn:"Never give s3:* (all actions) to Principal: * (everyone). This allows anyone in the world to upload, delete, and read your files. Only give s3:GetObject for public read-only buckets."
    },
    {
      n:"04", title:"Static Website Hosting on S3",
      short:"Serving HTML/CSS/JS directly from S3 without any web server",
      why:"Why run an EC2 instance 24/7 just to serve static HTML files? That's expensive! S3 can serve static websites directly — no EC2, no Apache, no Nginx needed. Perfect for React/Vue/Angular frontends, landing pages, documentation sites. Costs pennies instead of EC2 dollars.",
      how:[
        "Enable Static Website Hosting: S3 Bucket → Properties → Static website hosting → Enable",
        "Set Index document: index.html (default page)",
        "Set Error document: error.html (404 page)",
        "Disable Block Public Access AND add bucket policy for public s3:GetObject",
        "Your website URL: http://BUCKET-NAME.s3-website-REGION.amazonaws.com",
        "Add CloudFront in front for HTTPS and global caching"
      ],
      tip:"For React/Vue/Angular apps: build your app locally, then 'aws s3 sync ./build s3://your-bucket'. Add a CloudFront invalidation after each deployment so users get the latest version.",
      warn:"S3 static websites support only HTTP (not HTTPS directly). For HTTPS, put CloudFront in front with an ACM certificate. Also, S3 websites do NOT support server-side code (PHP, Python, Node.js) — only static files."
    }
  ],
  code:`<span class="c"># ── STEP 1: Create S3 Bucket ────────────────────────────────────</span>
<span class="c"># mb = make bucket, must be globally unique name</span>
<span class="cmd">aws</span> s3 mb s3://<span class="var">your-unique-bucket-name-2024</span> <span class="fl">--region</span> us-east-1

<span class="c"># Enable versioning (keeps old versions when you overwrite files)</span>
<span class="cmd">aws</span> s3api put-bucket-versioning \
  <span class="fl">--bucket</span> <span class="var">your-unique-bucket-name-2024</span> \
  <span class="fl">--versioning-configuration</span> Status=Enabled

<span class="c"># ── STEP 2: Upload Files ────────────────────────────────────────</span>
<span class="c"># Create a test file</span>
<span class="cmd">echo</span> <span class="str">"&lt;h1&gt;Hello S3!&lt;/h1&gt;"</span> > index.html

<span class="c"># cp = copy single file to S3</span>
<span class="c"># s3://bucket-name/path is the S3 destination</span>
<span class="cmd">aws</span> s3 cp index.html s3://<span class="var">your-unique-bucket-name-2024</span>/

<span class="c"># sync = copy entire directory, only changed files</span>
<span class="c"># --delete removes files in S3 that don't exist locally</span>
<span class="cmd">aws</span> s3 sync ./my-website/ s3://<span class="var">your-unique-bucket-name-2024</span>/ <span class="fl">--delete</span>

<span class="c"># ls = list files in bucket</span>
<span class="cmd">aws</span> s3 ls s3://<span class="var">your-unique-bucket-name-2024</span>/

<span class="c"># Download a file from S3</span>
<span class="cmd">aws</span> s3 cp s3://<span class="var">your-unique-bucket-name-2024</span>/index.html ./downloaded.html

<span class="c"># ── STEP 3: Disable Block Public Access (for website) ──────────</span>
<span class="cmd">aws</span> s3api put-public-access-block \
  <span class="fl">--bucket</span> <span class="var">your-unique-bucket-name-2024</span> \
  <span class="fl">--public-access-block-configuration</span> \
    <span class="str">"BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false"</span>

<span class="c"># ── Add Bucket Policy (public read) ────────────────────────────</span>
<span class="c"># This lets anyone read files (GET) but not upload or delete</span>
<span class="cmd">aws</span> s3api put-bucket-policy \
  <span class="fl">--bucket</span> <span class="var">your-unique-bucket-name-2024</span> \
  <span class="fl">--policy</span> <span class="str">'{
    "Version": "2012-10-17",
    "Statement": [{
      "Sid": "PublicReadGetObject",
      "Effect": "Allow",
      "Principal": "*",
      "Action": "s3:GetObject",
      "Resource": "arn:aws:s3:::your-unique-bucket-name-2024/*"
    }]
  }'</span>

<span class="c"># ── STEP 4: Enable Static Website Hosting ──────────────────────</span>
<span class="cmd">aws</span> s3 website s3://<span class="var">your-unique-bucket-name-2024</span>/ \
  <span class="fl">--index-document</span> index.html \
  <span class="fl">--error-document</span> error.html

<span class="c"># Your website URL format:</span>
<span class="c"># http://BUCKET-NAME.s3-website-REGION.amazonaws.com</span>
<span class="cmd">echo</span> <span class="str">"Visit: http://your-unique-bucket-name-2024.s3-website-us-east-1.amazonaws.com"</span>

<span class="c"># ── LIFECYCLE RULE: Auto-move old files to cheaper storage ──────</span>
<span class="cmd">aws</span> s3api put-bucket-lifecycle-configuration \
  <span class="fl">--bucket</span> <span class="var">your-unique-bucket-name-2024</span> \
  <span class="fl">--lifecycle-configuration</span> <span class="str">'{
    "Rules": [{
      "ID": "move-logs-to-glacier",
      "Status": "Enabled",
      "Filter": {"Prefix": "logs/"},
      "Transitions": [
        {"Days": 30, "StorageClass": "STANDARD_IA"},
        {"Days": 90, "StorageClass": "GLACIER"}
      ],
      "Expiration": {"Days": 365}
    }]
  }'</span>

<span class="c"># ── Useful S3 commands ──────────────────────────────────────────</span>
<span class="c"># Check bucket size</span>
<span class="cmd">aws</span> s3 ls s3://<span class="var">your-bucket</span> <span class="fl">--recursive</span> <span class="fl">--human-readable</span> <span class="fl">--summarize</span>

<span class="c"># Copy between buckets</span>
<span class="cmd">aws</span> s3 cp s3://<span class="var">source-bucket</span>/file.txt s3://<span class="var">dest-bucket</span>/file.txt

<span class="c"># Delete all files in bucket (DANGEROUS!)</span>
<span class="cmd">aws</span> s3 rm s3://<span class="var">your-bucket</span> <span class="fl">--recursive</span>`,
  note:"S3 Storage Classes by cost (expensive to cheap): STANDARD → STANDARD-IA (Infrequent Access) → ONE-ZONE-IA → GLACIER-INSTANT → GLACIER-FLEXIBLE → GLACIER-DEEP-ARCHIVE. Lifecycle rules automatically move files between classes to optimize cost. Logs you access rarely? Move to Glacier after 90 days and save 95% on storage cost.",
  quiz:[
    {q:"You created an S3 bucket and uploaded index.html. A user visits the bucket URL but gets 'Access Denied'. What are the TWO things you likely forgot?",opts:["Create a Route 53 record","1) Disable Block Public Access AND 2) Add a bucket policy granting s3:GetObject to Principal *","Install a web server on S3","Enable HTTPS"],a:1,e:"S3 has two separate access controls. Block Public Access is an account/bucket-level guard that overrides ALL policies. Even with a public bucket policy, if Block Public Access is ON, it blocks everything. You need: 1) Turn OFF Block Public Access, AND 2) Add bucket policy with s3:GetObject for Principal *. Both are required."},
    {q:"What is the difference between 'aws s3 cp' and 'aws s3 sync'?",opts:["cp is faster than sync","cp copies specific files; sync compares source and destination and only transfers new/changed files","sync deletes destination files; cp doesn't","There is no difference"],a:1,e:"aws s3 cp = copy a specific file or directory (always transfers everything specified). aws s3 sync = intelligent sync — compares source and destination, transfers ONLY files that don't exist or have changed in destination. Much more efficient for website deployments. Add --delete to also remove files in destination that no longer exist in source."},
    {q:"Your S3 bucket name is 'My_Application_Bucket'. Why will this fail?",opts:["Names must be under 10 characters","Bucket names must be lowercase and cannot contain underscores or uppercase letters","S3 doesn't support underscores","Bucket names must start with numbers"],a:1,e:"S3 bucket naming rules: 3-63 characters, must be lowercase (no uppercase), no underscores (use hyphens instead), cannot start/end with a hyphen, cannot be formatted as an IP address. 'my-application-bucket' is valid. 'My_Application_Bucket' has uppercase M and A, and underscores — all invalid."},
    {q:"What does S3 Versioning do?",opts:["Creates multiple copies in different regions","Keeps ALL versions of a file when you overwrite or delete it, so you can restore old versions","Increases read speed","Enables website hosting"],a:1,e:"With versioning enabled, when you upload a new version of 'report.pdf', S3 keeps BOTH the old and new version with different Version IDs. If you accidentally delete a file, S3 adds a 'delete marker' but keeps the file — you can restore it by removing the delete marker. Great for protecting against accidental overwrites/deletes."}
  ]
},

// MODULE 5 — IAM DEEP DIVE
// ═══════════════════════════════════════════════════════════════════
{
  id:5, title:"IAM — Permissions Deep Dive", icon:"🔑",
  tags:["Users","Groups","Roles","Policies","Security"],
  overview:"IAM (Identity and Access Management) is the security system of AWS. EVERYTHING in AWS requires IAM — creating EC2 instances, reading S3 buckets, sending emails, running Lambda functions. IAM answers two questions: WHO are you? (authentication) and WHAT are you allowed to do? (authorization). Getting IAM wrong = security breaches. Getting it right = your entire AWS environment is secure.",
  why:"IAM is the #1 topic in AWS certifications and the #1 cause of security incidents in AWS. Understanding IAM deeply means you can: prevent unauthorized access, give your apps exactly the permissions they need (no more, no less), and meet security compliance requirements.",
  steps:[
    {
      n:"01", title:"IAM Users — Why Not Use Root?",
      short:"Creating individual user accounts instead of using the root account",
      why:"The root account is like the master key to your entire AWS account. It can do EVERYTHING — delete all resources, close the account, change billing. Using it for daily work is like using your house master key as your regular key — one mistake and everything is gone. IAM Users have limited, specific permissions you control.",
      how:[
        "IAM Console → Users → Add User → Set username",
        "Console Access: create password for AWS Management Console login",
        "Programmatic Access: creates Access Key ID + Secret Access Key for CLI/SDK",
        "After creating user, immediately download credentials CSV — Secret Key is shown ONCE only",
        "Attach permissions: either directly or via Groups (Groups is preferred)"
      ],
      tip:"Create ONE admin IAM user for yourself with AdministratorAccess. Use this for daily work. Never use root except for billing and account settings. Enable MFA on both root and admin user.",
      warn:"Access Keys in IAM Users are long-term credentials. They don't expire unless you delete them. If someone steals your access key, they have permanent access until you revoke it. Rotate keys every 90 days."
    },
    {
      n:"02", title:"IAM Groups — Managing Permissions at Scale",
      short:"Organizing users into groups to manage permissions efficiently",
      why:"You have 20 developers. You need to give all of them EC2 access. Option A: attach policy to each of 20 users individually (tedious, error-prone). Option B: create 'Developers' group with EC2 policy, add all 20 users to group. When a new developer joins, add them to the group — instant access. When they leave, remove from group — instant revoke. Groups make permission management scalable.",
      how:[
        "IAM → User Groups → Create Group → Name it (Developers, DBAdmins, ReadOnly, etc.)",
        "Attach policies: AWS Managed (pre-built) or Custom (you write)",
        "Add users to the group",
        "A user can be in MULTIPLE groups — permissions are combined (union of all group policies)",
        "Groups CANNOT contain other groups (flat structure only)"
      ],
      tip:"Common group structure in companies: Admins (AdministratorAccess), Developers (EC2+S3+Lambda), DBAdmins (RDS+DynamoDB), ReadOnly (ViewOnlyAccess for auditors). Use groups for every team.",
      warn:"Groups cannot be used as a Principal in IAM policies! You can't say 'Group Developers can access S3'. Policies are attached TO groups, not the other way around."
    },
    {
      n:"03", title:"IAM Roles — The Right Way for EC2 & Services",
      short:"Giving AWS services temporary permissions without storing credentials",
      why:"Your EC2 instance needs to read from S3. Bad solution: SSH in, run 'aws configure', paste access keys. Problem: if someone hacks your instance, they steal your credentials. Good solution: IAM Role. The EC2 instance automatically gets temporary credentials (renewed every 1 hour) via the metadata service. No stored credentials = nothing to steal.",
      how:[
        "IAM → Roles → Create Role",
        "Trusted Entity: EC2 (means EC2 instances can assume this role)",
        "Attach policies: what can the EC2 instance DO with this role (e.g., AmazonS3ReadOnlyAccess)",
        "Attach role to EC2: EC2 Console → Instance → Actions → Security → Modify IAM Role",
        "Now on the instance: 'aws s3 ls' works WITHOUT running 'aws configure'",
        "Temporary credentials are available at: http://169.254.169.254/latest/meta-data/iam/security-credentials/"
      ],
      tip:"Roles work for Lambda, ECS tasks, API Gateway, and almost every AWS service. The pattern is always: create role with trusted entity = service, attach permissions policies, attach role to the service.",
      warn:"Never store AWS credentials (access keys) inside EC2 instances! Always use IAM Roles. Stored credentials in ~/.aws/credentials files are a major security risk — they persist forever and can be found in code commits, AMI snapshots, etc."
    },
    {
      n:"04", title:"IAM Policies — Reading JSON Permissions",
      short:"Understanding how permission documents are written and how to create custom ones",
      why:"Every IAM permission is defined in JSON. Understanding this JSON means you can: read existing policies to know what they allow, write custom policies with exactly the right permissions, debug 'Access Denied' errors by checking which policy is missing.",
      how:[
        "Version: always '2012-10-17' (the policy language version, never changes)",
        "Statement: array of permission rules",
        "Effect: 'Allow' or 'Deny' — what to do when this rule matches",
        "Action: the AWS API call. 's3:GetObject' = read a file. 'ec2:RunInstances' = launch instance",
        "Resource: what resource does this apply to. ARN format: arn:aws:s3:::bucket-name/*",
        "Condition: optional extra requirements (e.g., only allow from specific IP)"
      ],
      tip:"Use IAM Policy Simulator (in IAM console) to test if a user/role has permission to do something BEFORE deploying. Great for debugging 'Access Denied' errors.",
      warn:"DENY always beats ALLOW in IAM. Even if 5 policies allow an action, ONE explicit DENY blocks it. This makes DENY very powerful — use it to enforce hard restrictions like 'never allow deleting production S3 buckets'."
    }
  ],
  code:`<span class="c"># ── STEP 1: Create IAM User with all access types ───────────────</span>
<span class="cmd">aws</span> iam create-user <span class="fl">--user-name</span> developer-john

<span class="c"># Give console access (password login)</span>
<span class="cmd">aws</span> iam create-login-profile \
  <span class="fl">--user-name</span> developer-john \
  <span class="fl">--password</span> <span class="str">'TempPass123!Change'</span> \
  <span class="fl">--password-reset-required</span>

<span class="c"># Give programmatic access (CLI/SDK access keys)</span>
<span class="c"># SAVE THE OUTPUT — SecretAccessKey shown only once!</span>
<span class="cmd">aws</span> iam create-access-key <span class="fl">--user-name</span> developer-john

<span class="c"># ── STEP 2: Create Groups ────────────────────────────────────────</span>
<span class="c"># Create Developers group</span>
<span class="cmd">aws</span> iam create-group <span class="fl">--group-name</span> Developers

<span class="c"># Attach AWS managed policies to group</span>
<span class="c"># AmazonEC2FullAccess = full control of EC2</span>
<span class="cmd">aws</span> iam attach-group-policy \
  <span class="fl">--group-name</span> Developers \
  <span class="fl">--policy-arn</span> arn:aws:iam::aws:policy/AmazonEC2FullAccess

<span class="c"># AmazonS3ReadOnlyAccess = read only S3 access</span>
<span class="cmd">aws</span> iam attach-group-policy \
  <span class="fl">--group-name</span> Developers \
  <span class="fl">--policy-arn</span> arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

<span class="c"># Add user to group</span>
<span class="cmd">aws</span> iam add-user-to-group \
  <span class="fl">--user-name</span> developer-john \
  <span class="fl">--group-name</span> Developers

<span class="c"># ── STEP 3: Create IAM Role for EC2 ─────────────────────────────</span>
<span class="c"># Trust policy: allows EC2 service to assume this role</span>
<span class="cmd">cat</span> > ec2-trust-policy.json <span class="str">&lt;&lt;'EOF'</span>
{
  "Version": "2012-10-17",
  "Statement": [{
    "Effect": "Allow",
    "Principal": {"Service": "ec2.amazonaws.com"},
    "Action": "sts:AssumeRole"
  }]
}
<span class="str">EOF</span>

<span class="c"># Create the role</span>
<span class="cmd">aws</span> iam create-role \
  <span class="fl">--role-name</span> EC2-S3-Reader-Role \
  <span class="fl">--assume-role-policy-document</span> file://ec2-trust-policy.json

<span class="c"># Attach S3 read permission to role</span>
<span class="cmd">aws</span> iam attach-role-policy \
  <span class="fl">--role-name</span> EC2-S3-Reader-Role \
  <span class="fl">--policy-arn</span> arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

<span class="c"># Create instance profile (wrapper for EC2)</span>
<span class="cmd">aws</span> iam create-instance-profile \
  <span class="fl">--instance-profile-name</span> EC2-S3-Profile
<span class="cmd">aws</span> iam add-role-to-instance-profile \
  <span class="fl">--instance-profile-name</span> EC2-S3-Profile \
  <span class="fl">--role-name</span> EC2-S3-Reader-Role

<span class="c"># ── STEP 4: Write Custom Policy ─────────────────────────────────</span>
<span class="c"># Example: Allow reading from ONLY a specific S3 bucket</span>
<span class="cmd">cat</span> > custom-policy.json <span class="str">&lt;&lt;'EOF'</span>
{
  "Version": "2012-10-17",
  "Statement": [
    {
      "Sid": "AllowBucketListing",
      "Effect": "Allow",
      "Action": "s3:ListBucket",
      "Resource": "arn:aws:s3:::my-specific-bucket"
    },
    {
      "Sid": "AllowObjectReads",
      "Effect": "Allow",
      "Action": ["s3:GetObject", "s3:GetObjectVersion"],
      "Resource": "arn:aws:s3:::my-specific-bucket/*"
    },
    {
      "Sid": "DenyDeleteEverywhere",
      "Effect": "Deny",
      "Action": "s3:DeleteObject",
      "Resource": "*"
    }
  ]
}
<span class="str">EOF</span>

<span class="cmd">aws</span> iam create-policy \
  <span class="fl">--policy-name</span> ReadOnlySpecificBucket \
  <span class="fl">--policy-document</span> file://custom-policy.json

<span class="c"># ── ON EC2 INSTANCE — test role works ───────────────────────────</span>
<span class="c"># This works WITHOUT running 'aws configure'!</span>
<span class="cmd">aws</span> s3 ls  <span class="c"># Lists all buckets — works because of the role</span>
<span class="cmd">aws</span> sts get-caller-identity  <span class="c"># Shows the role identity</span>

<span class="c"># View temporary credentials from metadata service</span>
<span class="cmd">curl</span> http://169.254.169.254/latest/meta-data/iam/security-credentials/EC2-S3-Reader-Role`,
  note:"The Principle of Least Privilege: always start with NO permissions and add only what is needed. It's tempting to give AdministratorAccess to everything, but if that IAM user/role is compromised, the attacker can do ANYTHING. With least privilege, a compromised S3-reader role can only read S3 — nothing else.",
  quiz:[
    {q:"What is the CORRECT way to give an EC2 instance permission to access DynamoDB?",opts:["Run 'aws configure' on the EC2 and enter admin access keys","Store access keys in /etc/environment on the EC2","Create an IAM Role with DynamoDB permissions and attach it to the EC2 instance","Create an IAM User and store credentials in the app code"],a:2,e:"IAM Roles are the correct and ONLY recommended approach for giving AWS services permissions. The EC2 instance gets temporary credentials automatically via the metadata service. These rotate every hour. No credentials are stored on the instance. If the instance is compromised, the attacker gets credentials that expire in under an hour."},
    {q:"User John is in Groups: Developers (allows s3:GetObject) and Admins (allows s3:*). There's also a Deny policy on John directly (denies s3:DeleteObject). Can John delete S3 objects?",opts:["Yes, because Admins group allows s3:*","No, the explicit DENY on John overrides all ALLOW permissions","Only if John logs in as Admin","Yes, s3:* includes all actions"],a:1,e:"In IAM, DENY always wins over ALLOW. Even though John's Admins group policy allows s3:* (which includes DeleteObject), the explicit DENY on John's user directly blocks it. The evaluation order: 1) Check for explicit DENY → blocked. 2) Check for explicit ALLOW → allowed. 3) Default: DENY (implicit). One explicit DENY beats all the ALLOWs."},
    {q:"You create a new IAM User but forget to attach any policy. What can the user do?",opts:["Full access by default","Read-only access by default","Absolutely nothing — IAM starts with zero permissions","Only billing access"],a:2,e:"IAM follows the 'Default Deny' principle. A new user with no policies attached can do NOTHING in AWS — they cannot even view the EC2 dashboard. Every single permission must be explicitly granted. This is why 'Access Denied' errors are so common — you simply forgot to grant a specific permission."},
    {q:"What is the difference between an IAM Role's Trust Policy and Permission Policy?",opts:["They are the same thing","Trust Policy = WHO can assume the role; Permission Policy = WHAT the role can do in AWS","Trust Policy controls timing; Permission Policy controls services","Permission Policy is for users; Trust Policy is for groups"],a:1,e:"Every IAM Role has TWO policies: 1) Trust Policy (Assume Role Policy): defines which entities CAN assume this role. Example: 'ec2.amazonaws.com can assume this role'. 2) Permission Policy: what can this role DO in AWS after assuming it. Example: 'AmazonS3ReadOnlyAccess'. Both are required. Trust policy = the door lock. Permission policy = what's inside the room."}
  ]
},

// MODULE 6 — CLOUDWATCH DEEP DIVE
// ═══════════════════════════════════════════════════════════════════
{
  id:6, title:"CloudWatch — Monitoring", icon:"📊",
  tags:["Metrics","Alarms","Logs","SNS","Dashboards"],
  overview:"CloudWatch is AWS's monitoring and observability service. Every time your EC2 instance sends or receives data, uses CPU, or reads from disk — CloudWatch records it. Think of CloudWatch as a 24/7 doctor that continuously takes your servers' vital signs and alerts you if something is wrong. Without monitoring, you'd only know something is broken when users complain.",
  why:"In production environments, you CANNOT manually check every server's health. CloudWatch does it automatically. When CPU spikes at 3 AM, CloudWatch alarms wake you up (via email/SMS). When Auto Scaling triggers, CloudWatch metrics drove that decision. Every serious AWS setup uses CloudWatch extensively.",
  steps:[
    {
      n:"01", title:"Metrics — What They Are and How to View Them",
      short:"Understanding the data points CloudWatch collects from AWS services",
      why:"A metric is a time-series data point. 'EC2 instance i-1234 had 45% CPU at 2:00 PM' is a metric. CloudWatch stores 15 months of metric data. You can view trends, spot problems, and make decisions based on this data. Metrics are the foundation — alarms, dashboards, and auto scaling all use metrics.",
      how:[
        "CloudWatch Console → Metrics → All metrics → AWS/EC2 → Per-Instance Metrics",
        "Find your instance ID → CPUUtilization → click to add to graph",
        "Default: metrics every 5 minutes (FREE). Detailed Monitoring: every 1 minute (costs $0.01/instance/month)",
        "KEY METRIC MISSING: Memory and Disk usage are NOT in default EC2 metrics",
        "For Memory/Disk: install CloudWatch Agent on the instance → it sends these as custom metrics",
        "Custom namespace: your app can send its own metrics (OrdersPerMinute, ErrorCount, etc.)"
      ],
      tip:"Common EC2 metrics to watch: CPUUtilization (>80% = problem), NetworkIn/Out (spike = DDoS?), StatusCheckFailed (= instance is unreachable), DiskReadOps/WriteOps (disk I/O bottleneck).",
      warn:"CloudWatch does NOT know what's happening INSIDE your EC2 OS. It only sees what the hypervisor reports. Memory usage, process counts, open file descriptors — these require the CloudWatch Agent installed on the instance."
    },
    {
      n:"02", title:"SNS — Setting Up Alert Delivery",
      short:"Creating the notification channel before creating alarms",
      why:"When a CloudWatch alarm triggers, it needs somewhere to SEND the alert. SNS (Simple Notification Service) is the delivery mechanism. You create an SNS Topic, subscribe your email/phone to it, and when the alarm triggers, SNS delivers the message. Without SNS, alarms fire silently and nobody knows.",
      how:[
        "SNS Console → Topics → Create Topic → Standard → Name it 'ProdAlerts'",
        "Subscribe: Topic → Create Subscription → Protocol: Email → Endpoint: your@email.com",
        "CHECK YOUR EMAIL — AWS sends a confirmation email. CLICK CONFIRM SUBSCRIPTION",
        "Without confirming, subscriptions stay in PendingConfirmation state and NO notifications are sent",
        "SNS can also send to: SMS, Lambda function, SQS queue, HTTP endpoint, mobile push"
      ],
      tip:"Create separate SNS topics for different severity levels: 'Critical-Alerts' (production down), 'Warning-Alerts' (high CPU), 'Info-Alerts' (auto scaling events). Subscribe different people to different topics.",
      warn:"Spam folder! AWS SNS confirmation emails often end up in spam. Always check spam when you don't see the confirmation. Without confirming, you'll never receive any CloudWatch alarms."
    },
    {
      n:"03", title:"CloudWatch Alarms — Setting Up Threshold Alerts",
      short:"Creating automated alerts when metrics cross thresholds",
      why:"You can't watch CloudWatch graphs all day. Alarms watch the metrics FOR you. When CPU stays above 80% for 10 minutes, the alarm triggers and sends an email/SMS. This is how on-call engineers sleep at night — they trust alarms to wake them up if something is wrong.",
      how:[
        "CloudWatch → Alarms → Create Alarm → Select metric (e.g., CPUUtilization)",
        "Period: 5 minutes (how often to evaluate)",
        "Threshold type: Static (fixed value) or Anomaly Detection (AI-based, learns normal patterns)",
        "Condition: Greater than 80 (trigger if CPU > 80%)",
        "Evaluation Periods: 2 (must be above threshold for 2 consecutive periods = 10 minutes)",
        "Alarm Action: Send notification to SNS topic → In Alarm state only",
        "Also configure OK action: 'CPU back to normal' notification"
      ],
      tip:"Alarm States: OK (normal), ALARM (threshold crossed), INSUFFICIENT_DATA (not enough data points yet — happens right after creating alarm or when instance stops). Set up alarms for ALL critical services: EC2 CPU, RDS connections, ALB error rate, SQS queue depth.",
      warn:"Evaluation Periods prevents false alarms from brief spikes. If CPU spikes to 90% for 1 minute then drops, you don't want to be paged. 2 evaluation periods × 5 minutes = alarm only triggers if CPU is high for 10 continuous minutes."
    },
    {
      n:"04", title:"CloudWatch Dashboards — Unified View",
      short:"Building a single screen showing all your important metrics",
      why:"In real jobs, you have EC2 instances, RDS databases, ALBs, Lambda functions all running simultaneously. Opening 20 different consoles to check health is impractical. A CloudWatch Dashboard puts ALL your important metrics on one screen. It's the 'mission control' view of your entire infrastructure.",
      how:[
        "CloudWatch → Dashboards → Create Dashboard → Name it 'Production-Overview'",
        "Add widget: Line graph for EC2 CPU (select all production instances)",
        "Add widget: Number for current ALB Request Count",
        "Add widget: Alarm Status widget (shows all alarms, red/green)",
        "Arrange widgets in a logical layout",
        "Dashboards auto-refresh (you choose interval: 10 seconds to 15 minutes)"
      ],
      tip:"Share dashboards publicly (no AWS login required) for read-only NOC screens. Go to Dashboard → Actions → Share Dashboard. Great for putting on a TV screen in the office showing live production health.",
      warn:"Custom metrics (Memory, Disk) cost $0.30/metric/month. Free tier includes 10 custom metrics. If you install CloudWatch Agent on 50 instances with 10 metrics each = 500 custom metrics = $150/month extra. Plan accordingly."
    }
  ],
  code:`<span class="c"># ── STEP 1: Enable Detailed Monitoring on EC2 ───────────────────</span>
<span class="c"># Default: metrics every 5 min. Detailed: every 1 min</span>
<span class="cmd">aws</span> ec2 monitor-instances <span class="fl">--instance-ids</span> <span class="var">i-XXXXXXXXXXXXXXXXX</span>

<span class="c"># ── Install CloudWatch Agent (for Memory + Disk metrics) ────────</span>
<span class="c"># Run these commands on your EC2 instance via SSH</span>
<span class="cmd">sudo</span> yum install -y amazon-cloudwatch-agent

<span class="c"># Configure the agent (interactive wizard)</span>
<span class="cmd">sudo</span> /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-config-wizard

<span class="c"># Start the CloudWatch Agent</span>
<span class="cmd">sudo</span> systemctl start amazon-cloudwatch-agent
<span class="cmd">sudo</span> systemctl enable amazon-cloudwatch-agent

<span class="c"># ── STEP 2: Create SNS Topic for Alerts ────────────────────────</span>
<span class="c"># Create the topic</span>
<span class="cmd">aws</span> sns create-topic <span class="fl">--name</span> Production-Alerts \
  <span class="fl">--output</span> text <span class="fl">--query</span> TopicArn

<span class="c"># Subscribe your email (check inbox for confirmation!)</span>
<span class="cmd">aws</span> sns subscribe \
  <span class="fl">--topic-arn</span> arn:aws:sns:us-east-1:<span class="var">ACCOUNT_ID</span>:Production-Alerts \
  <span class="fl">--protocol</span> email \
  <span class="fl">--notification-endpoint</span> <span class="var">your@email.com</span>

<span class="c"># ── STEP 3: Create CloudWatch Alarms ───────────────────────────</span>
<span class="c"># Alarm 1: High CPU (>80% for 10 minutes)</span>
<span class="cmd">aws</span> cloudwatch put-metric-alarm \
  <span class="fl">--alarm-name</span> <span class="str">"HighCPU-WebServer"</span> \
  <span class="fl">--alarm-description</span> <span class="str">"CPU above 80% for 10 minutes"</span> \
  <span class="fl">--namespace</span> AWS/EC2 \
  <span class="fl">--metric-name</span> CPUUtilization \
  <span class="fl">--dimensions</span> Name=InstanceId,Value=<span class="var">i-XXXXXXXXXXXXXXXXX</span> \
  <span class="fl">--statistic</span> Average \
  <span class="fl">--period</span> <span class="num">300</span> \
  <span class="fl">--evaluation-periods</span> <span class="num">2</span> \
  <span class="fl">--threshold</span> <span class="num">80</span> \
  <span class="fl">--comparison-operator</span> GreaterThanThreshold \
  <span class="fl">--alarm-actions</span> arn:aws:sns:us-east-1:<span class="var">ACCOUNT_ID</span>:Production-Alerts \
  <span class="fl">--ok-actions</span> arn:aws:sns:us-east-1:<span class="var">ACCOUNT_ID</span>:Production-Alerts

<span class="c"># Alarm 2: Instance Status Check Failed</span>
<span class="cmd">aws</span> cloudwatch put-metric-alarm \
  <span class="fl">--alarm-name</span> <span class="str">"InstanceDown"</span> \
  <span class="fl">--namespace</span> AWS/EC2 \
  <span class="fl">--metric-name</span> StatusCheckFailed \
  <span class="fl">--dimensions</span> Name=InstanceId,Value=<span class="var">i-XXXXXXXXXXXXXXXXX</span> \
  <span class="fl">--statistic</span> Maximum \
  <span class="fl">--period</span> <span class="num">60</span> \
  <span class="fl">--evaluation-periods</span> <span class="num">2</span> \
  <span class="fl">--threshold</span> <span class="num">1</span> \
  <span class="fl">--comparison-operator</span> GreaterThanOrEqualToThreshold \
  <span class="fl">--alarm-actions</span> arn:aws:sns:us-east-1:<span class="var">ACCOUNT_ID</span>:Production-Alerts

<span class="c"># ── STEP 4: Get Current Metric Value ───────────────────────────</span>
<span class="cmd">aws</span> cloudwatch get-metric-statistics \
  <span class="fl">--namespace</span> AWS/EC2 \
  <span class="fl">--metric-name</span> CPUUtilization \
  <span class="fl">--dimensions</span> Name=InstanceId,Value=<span class="var">i-XXXXXXXXXXXXXXXXX</span> \
  <span class="fl">--start-time</span> $(date <span class="fl">-u</span> <span class="fl">-d</span> <span class="str">'1 hour ago'</span> +%Y-%m-%dT%H:%M:%SZ) \
  <span class="fl">--end-time</span> $(date <span class="fl">-u</span> +%Y-%m-%dT%H:%M:%SZ) \
  <span class="fl">--period</span> <span class="num">300</span> \
  <span class="fl">--statistics</span> Average Maximum \
  <span class="fl">--output</span> table

<span class="c"># ── Send Custom Metric (your app's business metrics) ────────────</span>
<span class="c"># Example: track number of orders processed</span>
<span class="cmd">aws</span> cloudwatch put-metric-data \
  <span class="fl">--namespace</span> <span class="str">"MyApp/Business"</span> \
  <span class="fl">--metric-data</span> \
  <span class="str">'[
    {"MetricName":"OrdersProcessed","Value":42,"Unit":"Count"},
    {"MetricName":"ErrorRate","Value":0.5,"Unit":"Percent"}
  ]'</span>

<span class="c"># ── List all alarms and their current state ─────────────────────</span>
<span class="cmd">aws</span> cloudwatch describe-alarms \
  <span class="fl">--query</span> <span class="str">'MetricAlarms[*].[AlarmName,StateValue,MetricName,Threshold]'</span> \
  <span class="fl">--output</span> table`,
  note:"CloudWatch Logs Insights: you can run SQL-like queries on your log files. Example: find all 500 errors in the last hour, count them by endpoint, sort by frequency. This is incredibly powerful for production debugging. Go to CloudWatch → Logs Insights to try it.",
  quiz:[
    {q:"Memory usage of your EC2 instance is NOT showing in CloudWatch. Why?",opts:["Memory metrics are in a different region","CloudWatch does not support memory metrics","Memory metrics require the CloudWatch Agent installed on the instance","Memory monitoring costs extra to enable"],a:2,e:"CloudWatch collects metrics from the HYPERVISOR level (outside the instance). CPU, network, disk I/O are hypervisor-visible. Memory usage is INSIDE the OS — the hypervisor can't see it. To get memory metrics, install the CloudWatch Agent inside the instance. It reads memory from the OS and sends it to CloudWatch as custom metrics."},
    {q:"You created a CloudWatch Alarm and subscribed to SNS but never receive emails. What is the most common cause?",opts:["CloudWatch alarms don't support email","You need to set alarm state to ALARM manually first","You never confirmed the SNS subscription email that AWS sent","Alarms only work for production accounts"],a:2,e:"SNS email subscriptions require explicit confirmation. When you subscribe an email, AWS sends a confirmation email with a unique link. Until you click 'Confirm subscription', the subscription is in PendingConfirmation state and NO notifications are ever delivered. Always check your inbox (and spam folder) immediately after subscribing."},
    {q:"Your alarm has Period=300 and EvaluationPeriods=3. How long must CPU be above threshold before alarm triggers?",opts:["5 minutes","10 minutes","15 minutes","1 minute"],a:2,e:"Period=300 means each evaluation window is 300 seconds (5 minutes). EvaluationPeriods=3 means the threshold must be exceeded for 3 CONSECUTIVE periods. 3 × 300 seconds = 900 seconds = 15 minutes. This prevents brief spikes from causing false alarms. A single 90-second CPU spike won't trigger this alarm."},
    {q:"What is the difference between CloudWatch Metrics and CloudWatch Logs?",opts:["They are the same service","Metrics = numerical time-series data (CPU %, request count); Logs = text output from applications and services","Metrics are free; Logs cost money","Logs are older and deprecated"],a:1,e:"Metrics are numerical time-series data points (47% CPU at 14:05, 52% at 14:10). Good for trending, graphing, and alarm thresholds. Logs are text records of events (Apache access logs, application errors, OS syslog). Good for debugging and searching for specific events. Use Logs Insights to query logs with SQL-like syntax."}
  ]
},
