<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Learning Platform</title>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --accent:#14b8a6;
  --accent-light:#2dd4bf;
  --text:#e2e8f0;
  --muted:#94a3b8;
  --border:#334155;
  --success:#22c55e;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);
  color:var(--text);
  font-family:Arial, sans-serif;
  padding:40px;
}

h1{margin-bottom:20px;color:var(--accent)}

.module{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  margin-bottom:30px;
  border:1px solid var(--border);
}

.task{
  background:#0b1220;
  padding:15px;
  border-radius:8px;
  margin-top:10px;
  border:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  background:var(--accent);
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:var(--accent-light);
}

.progress-box{
  margin-bottom:30px;
}

.progress-track{
  height:12px;
  background:var(--border);
  border-radius:20px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  width:0%;
  background:var(--accent);
  transition:0.3s;
}

.small{
  font-size:14px;
  color:var(--muted);
  margin-top:5px;
}

.completed{
  background:var(--success) !important;
  color:#000 !important;
}
</style>
</head>

<body>

<h1>AWS Education Platform</h1>

<div class="progress-box">
  <strong>Course Progress</strong>
  <div class="progress-track">
    <div class="progress-fill" id="progressBar"></div>
  </div>
  <div class="small" id="progressText">0% Completed</div>
</div>

<div class="module">
  <h2>Module 1: Networking Basics</h2>

  <div class="task">
    <span>Check IP using ip addr show</span>
    <button class="task-btn">Mark Complete</button>
  </div>

  <div class="task">
    <span>Ping 8.8.8.8 and analyze result</span>
    <button class="task-btn">Mark Complete</button>
  </div>
</div>

<div class="module">
  <h2>Module 2: EC2 Launch</h2>

  <div class="task">
    <span>Launch t2.micro instance</span>
    <button class="task-btn">Mark Complete</button>
  </div>

  <div class="task">
    <span>Install Apache on EC2</span>
    <button class="task-btn">Mark Complete</button>
  </div>
</div>

<script>

const buttons = document.querySelectorAll('.task-btn');
const progressBar = document.getElementById('progressBar');
const progressText = document.getElementById('progressText');

function updateProgress(){
  const total = buttons.length;
  const done = document.querySelectorAll('.completed').length;
  const percent = Math.round((done/total)*100);
  progressBar.style.width = percent + "%";
  progressText.innerText = percent + "% Completed";
}

buttons.forEach((btn,index)=>{
  const key = "task_" + index;

  if(localStorage.getItem(key)==="done"){
    btn.classList.add("completed");
    btn.innerText="Completed";
  }

  btn.addEventListener("click",()=>{
    btn.classList.add("completed");
    btn.innerText="Completed";
    localStorage.setItem(key,"done");
    updateProgress();
  });
});

updateProgress();

</script>

</body>
</html>
