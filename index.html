<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Deep Dive Guide</title>

<style>
:root{
--bg:#0d1117;
--card:#111927;
--border:#1f2a37;
--orange:#ff6b2b;
--green:#00d084;
--text:#e6edf3;
--muted:#7d8590;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:var(--bg);color:var(--text)}
header{
padding:50px 20px;
text-align:center;
border-bottom:1px solid var(--border);
}
h1{font-size:48px;margin-bottom:10px}
p{color:var(--muted)}

nav{
display:flex;
overflow:auto;
background:#0f141b;
border-bottom:1px solid var(--border);
}
nav button{
background:none;
border:none;
color:var(--muted);
padding:15px 25px;
cursor:pointer;
white-space:nowrap;
font-size:13px;
}
nav button.active{
color:var(--orange);
border-bottom:2px solid var(--orange);
}

main{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

.module{display:none}
.module.active{display:block}

.card{
background:var(--card);
border:1px solid var(--border);
padding:25px;
margin-bottom:25px;
}

h2{margin-bottom:15px}
h3{margin-bottom:10px;color:var(--orange)}

.code{
background:#000;
padding:15px;
overflow:auto;
margin-top:15px;
border-left:3px solid var(--green);
position:relative;
}

pre{
font-family:monospace;
font-size:13px;
color:var(--green);
white-space:pre-wrap;
}

.copy{
position:absolute;
top:10px;
right:10px;
font-size:11px;
background:none;
border:1px solid var(--border);
color:var(--muted);
padding:3px 10px;
cursor:pointer;
}
.copy:hover{
color:var(--green);
border-color:var(--green);
}

.progress{
position:fixed;
bottom:20px;
right:20px;
background:var(--card);
border:1px solid var(--border);
padding:15px 25px;
font-size:13px;
}
</style>
</head>

<body>

<header>
<h1>AWS Deep Dive</h1>
<p>Hands-on AWS Practical Guide</p>
</header>

<nav id="tabs"></nav>
<main id="content"></main>

<div class="progress">
Completed: <span id="progressCount">0</span> / <span id="totalCount"></span>
</div>

<script>
const DATA = [
{
title:"EC2 + Apache",
steps:[
{
title:"Launch EC2",
desc:"Create Amazon Linux 2 t2.micro with port 22 and 80 open"
},
{
title:"Install Apache",
desc:"Install and start Apache",
code:`sudo yum update -y
sudo yum install httpd -y
sudo systemctl start httpd
sudo systemctl enable httpd`
}
]
},
{
title:"Nginx Setup",
steps:[
{
title:"Stop Apache",
code:`sudo systemctl stop httpd`
},
{
title:"Install Nginx",
code:`sudo amazon-linux-extras install nginx1 -y
sudo systemctl start nginx
sudo systemctl enable nginx`
}
]
},
{
title:"Load Balancer",
steps:[
{
title:"Create Target Group",
code:`aws elbv2 create-target-group --name web-tg --protocol HTTP --port 80`
},
{
title:"Create ALB",
code:`aws elbv2 create-load-balancer --name my-alb`
}
]
},
{
title:"Auto Scaling",
steps:[
{
title:"Create Launch Template",
code:`aws ec2 create-launch-template --launch-template-name WebTemplate`
},
{
title:"Create ASG",
code:`aws autoscaling create-auto-scaling-group --auto-scaling-group-name WebASG`
}
]
}
];

const tabs=document.getElementById("tabs");
const content=document.getElementById("content");
const progressCount=document.getElementById("progressCount");
const totalCount=document.getElementById("totalCount");

let completed=0;
totalCount.textContent=DATA.length;

function render(){
DATA.forEach((mod,index)=>{
// tab
const btn=document.createElement("button");
btn.textContent=mod.title;
btn.onclick=()=>activate(index);
tabs.appendChild(btn);

// module
const section=document.createElement("div");
section.className="module";

let html=`<div class="card"><h2>${mod.title}</h2></div>`;

mod.steps.forEach(step=>{
html+=`<div class="card">
<h3>${step.title}</h3>
<p>${step.desc||""}</p>
${step.code?`
<div class="code">
<button class="copy">COPY</button>
<pre>${step.code}</pre>
</div>`:""}
</div>`;
});

section.innerHTML=html;
content.appendChild(section);
});
}

function activate(i){
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".module").forEach(m=>m.classList.remove("active"));

document.querySelectorAll("nav button")[i].classList.add("active");
document.querySelectorAll(".module")[i].classList.add("active");

completed=i+1;
progressCount.textContent=completed;
}

document.addEventListener("click",e=>{
if(e.target.classList.contains("copy")){
const text=e.target.nextElementSibling.innerText;
navigator.clipboard.writeText(text);
e.target.textContent="COPIED";
setTimeout(()=>e.target.textContent="COPY",1500);
}
});

render();
activate(0);
</script>

</body>
</html>
