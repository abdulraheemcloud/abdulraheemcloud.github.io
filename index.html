<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Deep Guide</title>

<style>
body{margin:0;font-family:Arial;background:#0d1117;color:#e6edf3}
header{padding:40px;text-align:center;border-bottom:1px solid #222}
h1{margin:0;font-size:40px}
nav{display:flex;overflow:auto;background:#111;border-bottom:1px solid #222}
nav button{
  background:none;border:none;color:#aaa;
  padding:15px 20px;cursor:pointer;white-space:nowrap
}
nav button.active{color:#ff6b2b;border-bottom:2px solid #ff6b2b}
section{display:none;padding:30px;max-width:900px;margin:auto}
section.active{display:block}
.code{background:#000;padding:15px;overflow:auto;margin-top:20px}
pre{color:#00d084;font-size:13px}
</style>
</head>
<body>

<header>
<h1>AWS Deep Dive</h1>
<p>Hands-on practical AWS learning</p>
</header>

<nav id="tabs"></nav>
<main id="content"></main>

<script>
const DATA = [
{
title:"EC2 + Apache",
content:"Launch EC2, SSH, install Apache",
code:`sudo yum update -y
sudo yum install httpd -y
sudo systemctl start httpd
sudo systemctl enable httpd`
},
{
title:"Nginx Setup",
content:"Stop Apache and install Nginx",
code:`sudo systemctl stop httpd
sudo amazon-linux-extras install nginx1 -y
sudo systemctl start nginx
sudo systemctl enable nginx`
},
{
title:"Load Balancer",
content:"Create ALB and attach target group",
code:`aws elbv2 create-load-balancer --name my-alb
aws elbv2 create-target-group --name web-tg --protocol HTTP --port 80`
},
{
title:"Auto Scaling",
content:"Create ASG and scaling policy",
code:`aws autoscaling create-auto-scaling-group --auto-scaling-group-name WebASG
aws autoscaling put-scaling-policy --policy-type TargetTrackingScaling`
}
];

const tabs = document.getElementById("tabs");
const content = document.getElementById("content");

function render() {
  DATA.forEach((item,index)=>{
    const btn = document.createElement("button");
    btn.textContent = item.title;
    btn.onclick = ()=>activate(index);
    tabs.appendChild(btn);

    const section = document.createElement("section");
    section.innerHTML = `
      <h2>${item.title}</h2>
      <p>${item.content}</p>
      <div class="code"><pre>${item.code}</pre></div>
    `;
    content.appendChild(section);
  });
}

function activate(i){
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll("nav button")[i].classList.add("active");
  document.querySelectorAll("section")[i].classList.add("active");
}

render();
activate(0);
</script>

</body>
</html>
